cubes:
  - name: partidasVenta
    title: "Detalle de Ventas (Partidas)"
    sql_table: canastos_tfx.tfx_table_partvta
    public: true

    joins:
      - name: ventas
        relationship: many_to_one
        # Esta lógica selecciona un solo documento por venta (FAC > TIC > REM) para evitar duplicados
        sql: |
          {CUBE}.venta = {ventas.numeroVenta} 
          AND {CUBE}.sucursal = {ventas.sucursal}
          AND {ventas.tipoDocumento} = (
            SELECT v2.tipo_doc 
            FROM canastos_tfx.tfx_table_ventas v2
            WHERE v2.venta = {CUBE}.venta AND v2.sucursal = {CUBE}.sucursal
            ORDER BY 
              CASE v2.tipo_doc 
                WHEN 'FAC' THEN 1 
                WHEN 'TIC' THEN 2 
                WHEN 'REM' THEN 3 
                ELSE 4 END 
            LIMIT 1
          )

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.articulo || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true
        title: "ID Partida"

      - name: venta
        sql: "{CUBE}.venta"
        type: string
        title: "Número Venta"

      - name: impuesto_value
        sql: "{CUBE}.impuesto_value"
        type: number
        # impuesto_value = precio * tasa (monto unitario, NO la tasa en sí)
        title: "Impuesto Unitario ($)"

      - name: skuRaw
        sql: "{CUBE}.articulo"
        type: string
        title: "SKU (Ticket)"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: fecha
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha"

      - name: is_viable
        sql: "{CUBE}.is_viable"
        type: boolean
        title: "Es Viable"

      - name: precio
        sql: "{CUBE}.precio"
        type: number
        title: "Precio Unitario"

      - name: cantidad_dim
        sql: "{CUBE}.cantidad"
        type: number
        title: "Cantidad Unitario"

      - name: costo_unitario_calc
        sql: |
          CASE 
            WHEN {CUBE}.costo <= 0 OR {CUBE}.costo > {CUBE}.precio 
            THEN {CUBE}.precio * 0.80
            ELSE {CUBE}.costo
          END
        type: number

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1 THEN 'Enero' WHEN 2 THEN 'Febrero' WHEN 3 THEN 'Marzo'
            WHEN 4 THEN 'Abril' WHEN 5 THEN 'Mayo' WHEN 6 THEN 'Junio'
            WHEN 7 THEN 'Julio' WHEN 8 THEN 'Agosto' WHEN 9 THEN 'Septiembre'
            WHEN 10 THEN 'Octubre' WHEN 11 THEN 'Noviembre' WHEN 12 THEN 'Diciembre'
          END
        type: string
        title: "Mes"

      - name: diaSemana
        sql: "EXTRACT(DOW FROM {CUBE}.partition_date)"
        type: number
        title: "Día Semana"

    measures:
      - name: ingresoTotalViable
        sql: "{CUBE}.cantidad * {CUBE}.precio"
        type: sum
        format: currency
        title: "Ingreso Bruto"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      # CORRECCIÓN: impuesto_value es el monto por UNIDAD (precio * tasa).
      # Para obtener el impuesto total de la partida se debe multiplicar por cantidad.
      # La detección de tasa se hace dividiendo impuesto_value / precio (unitario vs unitario).
      - name: impuestoIVA16
        sql: |
          CASE 
            WHEN ROUND(ABS({CUBE}.impuesto_value / NULLIF({CUBE}.precio, 0)), 2) = 0.16 
            THEN {CUBE}.impuesto_value * {CUBE}.cantidad
            ELSE 0 
          END
        type: sum
        format: currency
        title: "IVA 16%"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: impuestoIEPS8
        sql: |
          CASE 
            WHEN ROUND(ABS({CUBE}.impuesto_value / NULLIF({CUBE}.precio, 0)), 2) = 0.08 
            THEN {CUBE}.impuesto_value * {CUBE}.cantidad
            ELSE 0 
          END
        type: sum
        format: currency
        title: "IEPS 8%"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      # CORRECCIÓN: se agrega * cantidad porque impuesto_value es monto unitario, no total de partida.
      - name: totalImpuestosCalculados
        sql: "{CUBE}.impuesto_value * {CUBE}.cantidad"
        type: sum
        format: currency
        title: "Total Impuestos"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: conteoTickets
        sql: "{CUBE}.venta"
        type: count_distinct
        title: "# Tickets"
        filters: [{ sql: "{CUBE}.is_viable = true" }]
