cubes:
  - name: partidasVenta
    title: "Detalle de Ventas (Partidas)"
    sql_table: canastos_tfx.tfx_table_partvta
    public: true

    joins:
      - name: ventas
        relationship: many_to_one
        sql: |
          {CUBE}.venta = {ventas.numeroVenta} 
          AND {CUBE}.sucursal = {ventas.sucursal}
          AND {ventas.tipoDocumento} = (
            SELECT v2.tipo_doc 
            FROM canastos_tfx.tfx_table_ventas v2
            WHERE v2.venta = {CUBE}.venta AND v2.sucursal = {CUBE}.sucursal
            ORDER BY 
              CASE v2.tipo_doc 
                WHEN 'FAC' THEN 1 
                WHEN 'TIC' THEN 2 
                WHEN 'REM' THEN 3 
                ELSE 4 END 
            LIMIT 1
          )

    segments:
      - name: soloVentaOficial
        public: true
        description: "Filtra para obtener solo el documento principal y evitar duplicidad de impuestos."
        sql: |
          {CUBE}.tipo_doc = (
            SELECT v2.tipo_doc 
            FROM canastos_tfx.tfx_table_ventas v2
            WHERE v2.venta = {CUBE}.venta AND v2.sucursal = {CUBE}.sucursal
            ORDER BY 
              CASE v2.tipo_doc 
                WHEN 'FAC' THEN 1 
                WHEN 'TIC' THEN 2 
                WHEN 'REM' THEN 3 
                ELSE 4 END 
            LIMIT 1
          )

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.articulo || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true
        title: "ID Partida"

      - name: venta
        sql: "{CUBE}.venta"
        type: string
        title: "Número Venta"

      - name: impuesto_value
        sql: "{CUBE}.impuesto_value"
        type: number
        title: "Impuesto Unitario ($)"

      - name: skuRaw
        sql: "{CUBE}.articulo"
        type: string
        title: "SKU (Ticket)"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: fecha
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha"

      - name: is_viable
        sql: "{CUBE}.is_viable"
        type: boolean
        title: "Es Viable"

      - name: precio
        sql: "{CUBE}.precio"
        type: number
        title: "Precio Unitario"

      - name: cantidad_dim
        sql: "{CUBE}.cantidad"
        type: number
        title: "Cantidad Unitario"

      - name: costo_unitario_calc
        sql: |
          CASE 
            WHEN {CUBE}.costo <= 0 OR {CUBE}.costo > {CUBE}.precio 
            THEN {CUBE}.precio * 0.80
            ELSE {CUBE}.costo
          END
        type: number

    measures:
      - name: ingresoTotalViable
        sql: "{CUBE}.cantidad * {CUBE}.precio"
        type: sum
        format: currency
        title: "Ingreso Bruto"
        filters: 
          - sql: "{CUBE}.is_viable = true"
          - segment: soloVentaOficial

      - name: impuestoIVA16
        sql: |
          CASE 
            WHEN ROUND(ABS({CUBE}.impuesto_value / NULLIF({CUBE}.precio, 0)), 2) = 0.16 
            THEN {CUBE}.impuesto_value * {CUBE}.cantidad
            ELSE 0 
          END
        type: sum
        format: currency
        title: "IVA 16%"
        filters: 
          - sql: "{CUBE}.is_viable = true"
          - segment: soloVentaOficial

      - name: impuestoIEPS8
        sql: |
          CASE 
            WHEN ROUND(ABS({CUBE}.impuesto_value / NULLIF({CUBE}.precio, 0)), 2) = 0.08 
            THEN {CUBE}.impuesto_value * {CUBE}.cantidad
            ELSE 0 
          END
        type: sum
        format: currency
        title: "IEPS 8%"
        filters: 
          - sql: "{CUBE}.is_viable = true"
          - segment: soloVentaOficial

      - name: totalImpuestosCalculados
        sql: "{CUBE}.impuesto_value * {CUBE}.cantidad"
        type: sum
        format: currency
        title: "Total Impuestos"
        filters: 
          - sql: "{CUBE}.is_viable = true"
          - segment: soloVentaOficial

      - name: conteoTickets
        sql: "{CUBE}.venta"
        type: count_distinct
        title: "# Tickets"
        filters: 
          - sql: "{CUBE}.is_viable = true"
          - segment: soloVentaOficial
