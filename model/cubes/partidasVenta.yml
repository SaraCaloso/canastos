cubes:
  - name: partidasVenta
    title: "Detalle de Ventas (Partidas)"
    sql_table: canastos_tfx.tfx_table_partvta
    public: true

    joins:
      - name: ventas
        relationship: many_to_one
        sql: "{CUBE}.venta = {ventas.numeroVenta} AND {CUBE}.sucursal = {ventas.sucursal}"

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.articulo || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true
        title: "ID Partida"

      - name: venta
        sql: "{CUBE}.venta"
        type: string
        title: "Número Venta"

      - name: impuesto_value
        sql: "{CUBE}.impuesto_value"
        type: number
        title: "Tasa Impuesto"

      - name: skuRaw
        sql: "{CUBE}.articulo"
        type: string
        title: "SKU (Ticket)"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: fecha
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha"

      - name: is_viable
        sql: "{CUBE}.is_viable"
        type: boolean
        title: "Es Viable"

      - name: precio
        sql: "{CUBE}.precio"
        type: number
        title: "Precio Unitario"
      
      - name: cantidad_dim
        sql: "{CUBE}.cantidad"
        type: number
        title: "Cantidad Unitario"

      - name: costo_unitario_calc
        sql: |
          CASE 
            WHEN {CUBE}.costo <= 0 OR {CUBE}.costo > {CUBE}.precio 
            THEN {CUBE}.precio * 0.80
            ELSE {CUBE}.costo
          END
        type: number

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: "CASE WHEN EXTRACT(MONTH FROM {CUBE}.partition_date) = 1 THEN 'January' ELSE 'Other' END"
        type: string
        title: "Mes"

      - name: diaSemana
        sql: "EXTRACT(DOW FROM {CUBE}.partition_date)"
        type: number
        title: "Día Semana"

    measures:
      - name: ingresoTotal
        sql: "{CUBE}.cantidad * {CUBE}.precio"
        type: sum
        format: currency
        title: "Ingreso Bruto"

      # --- DESGLOSE DE IMPUESTOS CORREGIDO ---
      - name: impuestoIVA16
        # Se ajusta para capturar 16% incluso con decimales del ERP
        sql: "CASE WHEN {CUBE}.impuesto_value >= 15 THEN {CUBE}.cantidad * {CUBE}.precio * 0.16 ELSE 0 END"
        type: sum
        format: currency
        title: "IVA 16%"

      - name: impuestoIEPS8
        # Se ajusta rango para capturar 8% de forma segura
        sql: "CASE WHEN {CUBE}.impuesto_value > 0 AND {CUBE}.impuesto_value < 10 THEN {CUBE}.cantidad * {CUBE}.precio * 0.08 ELSE 0 END"
        type: sum
        format: currency
        title: "IEPS 8%"

      - name: totalImpuestosCalculados
        sql: "{impuestoIVA16} + {impuestoIEPS8}"
        type: number
        format: currency
        title: "Total Impuestos (Partidas)"
