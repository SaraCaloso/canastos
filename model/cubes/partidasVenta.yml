# =============================================================================
# CUBO: partidasVenta
# =============================================================================
# Este cubo representa el DETALLE de cada venta, es decir, cada línea/artículo
# dentro de un ticket o factura. Es el cubo principal de análisis de ventas.
#
# Fuente de datos: canastos_tfx.tfx_table_partvta
#   → Cada fila = un artículo vendido en una transacción específica.
#
# Relación con otros cubos:
#   → Se une con el cubo "ventas" (cabecero) por número de venta + sucursal.
#   → El cubo "analiticaVentas" (vista maestra) lo consume junto con otros cubos.
# =============================================================================

cubes:
  - name: partidasVenta
    title: "Detalle de Ventas (Partidas)"
    sql_table: canastos_tfx.tfx_table_partvta
    public: true # Visible en el explorador de datos de Cube.js

    # -------------------------------------------------------------------------
    # JOINS
    # Relaciona cada partida con su cabecero de venta (folio + sucursal).
    # Es una relación muchos-a-uno: muchas partidas pertenecen a una sola venta.
    # -------------------------------------------------------------------------
    joins:
      - name: ventas
        relationship: many_to_one
        sql: |
          {CUBE}.venta = {ventas.numeroVenta}
          AND {CUBE}.sucursal = {ventas.sucursal}
          # Se cruza por AMBOS campos (folio + sucursal) para evitar
          # mezclar folios iguales de distintas sucursales.

    # -------------------------------------------------------------------------
    # DIMENSIONES
    # Atributos descriptivos usados para filtrar, agrupar o segmentar los datos.
    # -------------------------------------------------------------------------
    dimensions:
      # Llave primaria única por partida.
      # Se construye combinando venta + artículo + sucursal + fecha de partición
      # para garantizar unicidad incluso si el mismo artículo aparece en
      # diferentes fechas o sucursales.
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.articulo || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true
        title: "ID Partida"

      # Número de folio de la venta (ticket o factura).
      # Se usa para agrupar todas las partidas de una misma transacción.
      - name: venta
        sql: "{CUBE}.venta"
        type: string
        title: "Número Venta"

      # Valor del impuesto expresado como número (p.ej. 16 = IVA 16%, 8 = IEPS 8%).
      # Se usa para determinar qué tasa aplicar en los cálculos de impuestos.
      - name: impuesto_value
        sql: "{CUBE}.impuesto_value"
        type: number
        title: "Monto Impuesto Unitario ($)"

      # Tasa de impuesto del artículo (campo directo de la tabla).
      # Valores esperados: 0, 8 (IEPS), 16 (IVA).
      - name: impuesto
        sql: "{CUBE}.impuesto"
        type: number
        title: "Impuesto Unitario ($)"

      # Código de artículo tal como viene en el ticket o factura.
      # Se le llama "Raw" porque puede contener el código original del sistema
      # sin ninguna normalización adicional.
      - name: skuRaw
        sql: "{CUBE}.articulo"
        type: string
        title: "SKU (Ticket)"

      # Clave de la sucursal donde se realizó la venta.
      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      # Fecha en que se registró la venta (campo de partición de la tabla).
      # Se usa para filtros y agrupaciones temporales (día, mes, año).
      - name: fecha
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha"

      # Indicador booleano que marca si la partida es "viable" para análisis.
      # Las partidas no viables son registros inválidos, cancelados o duplicados
      # que deben excluirse de los reportes. Casi todas las métricas filtran
      # por is_viable = true.
      - name: is_viable
        sql: "{CUBE}.is_viable"
        type: boolean
        title: "Es Viable"

      # Precio unitario del artículo en el momento de la venta.
      # Este es el precio ANTES de impuestos.
      - name: precio
        sql: "{CUBE}.precio"
        type: number
        title: "Precio Unitario"

      # Cantidad de unidades vendidas del artículo en esta partida.
      - name: cantidad_dim
        sql: "{CUBE}.cantidad"
        type: number
        title: "Cantidad"

      # Costo unitario calculado con validación de integridad.
      # Si el costo registrado es 0 o mayor al precio de venta (lo cual sería
      # un error de captura), se estima como el 80% del precio de venta.
      # Esto evita márgenes negativos o nulos en análisis de rentabilidad.
      - name: costo_unitario_calc
        sql: |
          CASE 
            WHEN {CUBE}.costo <= 0 OR {CUBE}.costo > {CUBE}.precio 
            THEN {CUBE}.precio * 0.80   -- Estimación: margen bruto del 20%
            ELSE {CUBE}.costo           -- Costo real registrado
          END
        type: number

      # Año de la fecha de venta. Útil para filtros y agrupaciones anuales.
      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      # Número de mes (1 = Enero, 12 = Diciembre).
      # Se usa para ordenar correctamente en gráficas de tendencia mensual.
      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      # Nombre del mes en español. Se usa para etiquetas en reportes y dashboards.
      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1  THEN 'Enero'      WHEN 2  THEN 'Febrero'    WHEN 3  THEN 'Marzo'
            WHEN 4  THEN 'Abril'      WHEN 5  THEN 'Mayo'       WHEN 6  THEN 'Junio'
            WHEN 7  THEN 'Julio'      WHEN 8  THEN 'Agosto'     WHEN 9  THEN 'Septiembre'
            WHEN 10 THEN 'Octubre'    WHEN 11 THEN 'Noviembre'  WHEN 12 THEN 'Diciembre'
          END
        type: string
        title: "Mes"

      # Día de la semana (0 = Domingo, 6 = Sábado en PostgreSQL con EXTRACT DOW).
      # Útil para analizar patrones de venta por día de la semana.
      - name: diaSemana
        sql: "EXTRACT(DOW FROM {CUBE}.partition_date)"
        type: number
        title: "Día Semana"

      # Porcentaje de descuento aplicado al artículo.
      # Se usa COALESCE para tratar NULLs como 0 (sin descuento).
      - name: descuento
        sql: "COALESCE({CUBE}.descuento, 0)"
        type: number
        title: "Descuento por Artículo"

    # -------------------------------------------------------------------------
    # MEDIDAS
    # Valores numéricos agregados (sumas, conteos) para los reportes.
    # NOTA: Casi todas las medidas incluyen filtro is_viable = true para
    # excluir registros inválidos o cancelados.
    # -------------------------------------------------------------------------
    measures:
      # Ingreso bruto de la partida = precio × cantidad × (1 - descuento%).
      # Es la base de casi todos los reportes de ventas.
      # El filtro is_viable excluye partidas canceladas o con errores.
      - name: ingresoTotalViable
        sql: "{CUBE}.precio * {CUBE}.cantidad * (1 - COALESCE({CUBE}.descuento, 0) / 100.0)"
        type: sum
        format: currency
        title: "Ingreso Bruto"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      # Suma total de los descuentos aplicados en las partidas viables.
      # Se expresa en pesos (no en porcentaje).
      - name: descuentoTotal
        sql: "COALESCE({CUBE}.descuento, 0)"
        type: sum
        format: currency
        title: "Total Descuentos"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      # IVA calculado al 16% solo para artículos con tasa de impuesto = 16.
      # Fórmula: precio × cantidad × (1 - descuento%) × 0.16
      # Esta lógica está alineada con el reporte original del sistema contable.
      - name: impuestoIVA16
        sql: |
          CASE WHEN {CUBE}.impuesto = 16
          THEN {CUBE}.precio
               * {CUBE}.cantidad
               * (1 - COALESCE({CUBE}.descuento, 0) / 100.0)
               * 0.16
          ELSE 0 END
        type: sum
        format: currency
        title: "IVA 16%"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      # IEPS calculado al 8% solo para artículos con tasa de impuesto = 8.
      # Fórmula equivalente a la de IVA pero con tasa del 8%.
      # El IEPS aplica a ciertos productos como bebidas energéticas, etc.
      - name: impuestoIEPS8
        sql: |
          CASE WHEN {CUBE}.impuesto = 8
          THEN {CUBE}.precio
               * {CUBE}.cantidad
               * (1 - COALESCE({CUBE}.descuento, 0) / 100.0)
               * 0.08
          ELSE 0 END
        type: sum
        format: currency
        title: "IEPS 8%"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      # Total de impuestos por partida (IVA 16% + IEPS 8% según aplique).
      # Consolida ambas tasas en una sola medida para simplificar reportes.
      # Un artículo solo puede tener UNA tasa (16, 8 o 0), nunca ambas.
      - name: totalImpuestosCalculados
        sql: |
          CASE
            WHEN {CUBE}.impuesto = 16
            THEN {CUBE}.precio
                 * {CUBE}.cantidad
                 * (1 - COALESCE({CUBE}.descuento, 0) / 100.0)
                 * 0.16
            WHEN {CUBE}.impuesto = 8
            THEN {CUBE}.precio
                 * {CUBE}.cantidad
                 * (1 - COALESCE({CUBE}.descuento, 0) / 100.0)
                 * 0.08
            ELSE 0
          END
        type: sum
        format: currency
        title: "Total Impuestos"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      # Conteo de folios únicos de venta (tickets o facturas distintos).
      # Se usa como indicador de "clientes atendidos" en ventas de mostrador,
      # ya que cada ticket representa una transacción independiente.
      - name: conteoTickets
        sql: "{CUBE}.venta"
        type: count_distinct
        title: "# Tickets"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      # Total de unidades físicas vendidas (suma de cantidades).
      # Útil para análisis de volumen independientemente del precio.
      - name: cantidadVendida
        sql: "{CUBE}.cantidad"
        type: sum
        title: "Unidades Vendidas"
        filters: [{ sql: "{CUBE}.is_viable = true" }]
