cubes:
  - name: partidasVenta
    title: "Detalle de Ventas (Partidas)"
    sql_table: canastos_tfx.tfx_table_partvta
    public: true

    joins:
      - name: ventas
        relationship: many_to_one
        # CORRECCIÓN: join simplificado — la deduplicación FAC > TIC > PE > REM
        # ahora vive dentro del cubo ventas (via ROW_NUMBER en su sql).
        # Ya no se necesita subconsulta correlacionada aquí.
        sql: |
          {CUBE}.venta = {ventas.numeroVenta}
          AND {CUBE}.sucursal = {ventas.sucursal}

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.articulo || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true
        title: "ID Partida"

      - name: venta
        sql: "{CUBE}.venta"
        type: string
        title: "Número Venta"

      - name: impuesto_value
        sql: "{CUBE}.impuesto_value"
        type: number
        title: "Tasa Impuesto"

      - name: skuRaw
        sql: "{CUBE}.articulo"
        type: string
        title: "SKU (Ticket)"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: fecha
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha"

      - name: is_viable
        sql: "{CUBE}.is_viable"
        type: boolean
        title: "Es Viable"

      - name: precio
        sql: "{CUBE}.precio"
        type: number
        title: "Precio Unitario"

      - name: cantidad_dim
        sql: "{CUBE}.cantidad"
        type: number
        title: "Cantidad Unitario"

      - name: costo_unitario_calc
        sql: |
          CASE 
            WHEN {CUBE}.costo <= 0 OR {CUBE}.costo > {CUBE}.precio 
            THEN {CUBE}.precio * 0.80
            ELSE {CUBE}.costo
          END
        type: number

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1  THEN 'Enero'      WHEN 2  THEN 'Febrero'    WHEN 3  THEN 'Marzo'
            WHEN 4  THEN 'Abril'      WHEN 5  THEN 'Mayo'       WHEN 6  THEN 'Junio'
            WHEN 7  THEN 'Julio'      WHEN 8  THEN 'Agosto'     WHEN 9  THEN 'Septiembre'
            WHEN 10 THEN 'Octubre'    WHEN 11 THEN 'Noviembre'  WHEN 12 THEN 'Diciembre'
          END
        type: string
        title: "Mes"

      - name: diaSemana
        sql: "EXTRACT(DOW FROM {CUBE}.partition_date)"
        type: number
        title: "Día Semana"

      - name: descuento
        sql: "COALESCE({CUBE}.descuento, 0)"
        type: number
        title: "Descuento por Artículo"

      - name: impuesto
        sql: "{CUBE}.impuesto"
        type: number
        title: "Tasa Impuesto (0/8/16)"

    measures:
      - name: descuentoTotal
        sql: "COALESCE({CUBE}.descuento, 0)"
        type: sum
        format: currency
        title: "Total Descuentos (Partidas)"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: ingresoTotalViable
        sql: "({CUBE}.cantidad * {CUBE}.precio) - COALESCE({CUBE}.descuento, 0)"
        type: sum
        format: currency
        title: "Ingreso Bruto"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: impuestoIVA16
        sql: "CASE WHEN {CUBE}.impuesto = 16 THEN {CUBE}.impuesto_value ELSE 0 END"
        type: sum
        format: currency
        title: "IVA 16%"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: impuestoIEPS8
        sql: "CASE WHEN {CUBE}.impuesto = 8 THEN {CUBE}.impuesto_value ELSE 0 END"
        type: sum
        format: currency
        title: "IEPS 8%"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: totalImpuestosCalculados
        sql: "{CUBE}.impuesto_value"
        type: sum
        format: currency
        title: "Total Impuestos"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: conteoTickets
        sql: "{CUBE}.venta"
        type: count_distinct
        title: "# Tickets"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: cantidadVendida
        sql: "{CUBE}.cantidad"
        type: sum
        title: "Unidades Vendidas"
        filters: [{ sql: "{CUBE}.is_viable = true" }]
