cubes:
  - name: partidasVenta
    title: "Detalle de Ventas (Partidas)"
    sql_table: canastos_tfx.tfx_table_partvta
    public: true

    joins:
      - name: ventas
        relationship: many_to_one
        # Simplificamos el JOIN eliminando la subconsulta correlacionada
        sql: |
          {CUBE}.venta = {ventas.numeroVenta} 
          AND {CUBE}.sucursal = {ventas.sucursal}
          AND {ventas.tipoDocumento} IN ('FAC', 'TIC', 'REM', 'NC', 'DV', 'PE')
      
      - name: catalogoProductos
        relationship: many_to_one
        sql: |
          TRY_CAST({CUBE}.articulo AS BIGINT) IS NOT NULL
          AND TRY_CAST({CUBE}.articulo AS BIGINT) = {catalogoProductos.skuInt}

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.articulo || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true

      - name: venta
        sql: "{CUBE}.venta"
        type: string

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string

      - name: is_viable
        sql: "{CUBE}.is_viable"
        type: boolean

    measures:
      - name: ingresoTotalViable
        sql: "({CUBE}.cantidad * {CUBE}.precio) - COALESCE({CUBE}.descuento, 0)"
        type: sum
        format: currency
        title: "Venta Neta"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: impuestoIVA16
        sql: |
          CASE 
            WHEN ROUND(ABS({CUBE}.impuesto_value / NULLIF(({CUBE}.cantidad * {CUBE}.precio) - COALESCE({CUBE}.descuento, 0), 0)), 2) = 0.16 
            THEN {CUBE}.impuesto_value 
            ELSE 0 
          END
        type: sum
        format: currency
        title: "IVA 16%"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: impuestoIEPS8
        sql: |
          CASE 
            WHEN ROUND(ABS({CUBE}.impuesto_value / NULLIF(({CUBE}.cantidad * {CUBE}.precio) - COALESCE({CUBE}.descuento, 0), 0)), 2) = 0.08 
            THEN {CUBE}.impuesto_value 
            ELSE 0 
          END
        type: sum
        format: currency
        title: "IEPS 8%"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: margen
        sql: |
          (({CUBE}.cantidad * {CUBE}.precio) - COALESCE({CUBE}.descuento, 0)) - 
          ({CUBE}.cantidad * (CASE WHEN {CUBE}.costo <= 0 THEN {CUBE}.precio * 0.8 ELSE {CUBE}.costo END))
        type: sum
        format: currency
        title: "Utilidad Bruta"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      # Medidas migradas desde la Vista para evitar duplicidad
      - name: cantidadVendida
        sql: "{CUBE}.cantidad"
        type: sum
        title: "Unidades Vendidas"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: conteoTickets
        sql: "{CUBE}.venta"
        type: count_distinct
        title: "# Tickets"
        filters: [{ sql: "{CUBE}.is_viable = true" }]
