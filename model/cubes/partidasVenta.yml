cubes:
  - name: partidasVenta
    title: "Detalle de Ventas (Partidas)"
    sql_table: canastos_tfx.tfx_table_partvta
    public: true

    joins:
      - name: ventas
        relationship: many_to_one
        sql: "{CUBE}.venta = {ventas.numeroVenta} AND {CUBE}.sucursal = {ventas.sucursal}"
      
      # JOIN NUMÉRICO: Convertir SKU string con ceros ('001234') a integer (1234)
      # Solo matchea productos NUMÉRICOS del catálogo
      - name: catalogoProductos
        relationship: many_to_one
        sql: |
          TRY_CAST({CUBE}.articulo AS BIGINT) IS NOT NULL
          AND TRY_CAST({CUBE}.articulo AS BIGINT) = {catalogoProductos.skuInt}

    segments:
      - name: partidasValidas
        sql: "{CUBE}.is_viable = true"
        title: "Solo Partidas Viables"

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.articulo || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true
        title: "ID Partida"

      - name: venta
        sql: "{CUBE}.venta"
        type: string
        title: "Número Venta"

      - name: impuesto_value
        sql: "{CUBE}.impuesto_value"
        type: number
        title: "Impuestos"

      - name: skuRaw
        sql: "{CUBE}.articulo"
        type: string
        title: "SKU (Ticket)"

      - name: descripcion
        sql: "{CUBE}.observ"
        type: string
        title: "Descripción (Ticket)"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: fecha
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1 THEN 'January'
            WHEN 2 THEN 'February'
            WHEN 3 THEN 'March'
            WHEN 4 THEN 'April'
            WHEN 5 THEN 'May'
            WHEN 6 THEN 'June'
            WHEN 7 THEN 'July'
            WHEN 8 THEN 'August'
            WHEN 9 THEN 'September'
            WHEN 10 THEN 'October'
            WHEN 11 THEN 'November'
            WHEN 12 THEN 'December'
          END
        type: string
        title: "Mes"

      - name: diaSemana
        sql: |
          CASE EXTRACT(DOW FROM {CUBE}.partition_date)
            WHEN 0 THEN 'Sunday'
            WHEN 1 THEN 'Monday'
            WHEN 2 THEN 'Tuesday'
            WHEN 3 THEN 'Wednesday'
            WHEN 4 THEN 'Thursday'
            WHEN 5 THEN 'Friday'
            WHEN 6 THEN 'Saturday'
          END
        type: string
        title: "Día Semana"

      - name: is_viable
        sql: "{CUBE}.is_viable"
        type: boolean
        title: "Es Viable"
        public: false

      - name: precio
        sql: "{CUBE}.precio"
        type: number
        title: "Precio Unitario"
        public: false
      
      - name: cantidad_dim
        sql: "{CUBE}.cantidad"
        type: number
        title: "Cantidad Unitario"
        public: false

      - name: costo_unitario_calc
        sql: |
          CASE 
            WHEN {CUBE}.costo <= 0 OR {CUBE}.costo > {CUBE}.precio 
            THEN {CUBE}.precio * 0.80
            ELSE {CUBE}.costo
          END
        type: number
        public: false

    measures:
      - name: costoAjustado
        sql: |
          CASE 
            WHEN {CUBE}.costo <= 0 OR {CUBE}.costo > {CUBE}.precio 
            THEN {CUBE}.precio * 0.80
            ELSE {CUBE}.costo
          END
        type: sum
        title: "Costo Unitario Ajustado"
        
      - name: conteo
        type: count
        title: "# Líneas"

      - name: cantidad
        sql: "{CUBE}.cantidad"
        type: sum
        title: "Unidades"

      - name: ingreso
        sql: "{CUBE}.cantidad * {CUBE}.precio"
        type: sum
        format: currency
        title: "Venta Bruta"

      - name: costo
        sql: "{CUBE}.cantidad * {costoAjustado}"
        type: sum
        format: currency
        title: "Costo Total"

      - name: margen
        sql: "({CUBE}.cantidad * {CUBE}.precio) - ({CUBE}.cantidad * {costoAjustado})"
        type: sum
        format: currency
        title: "Utilidad"
