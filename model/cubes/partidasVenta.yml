cubes:
  - name: partidasVenta
    title: "Detalle de Ventas (Partidas)"
    sql_table: canastos_tfx.tfx_table_partvta
    public: true

    joins:
      - name: ventas
        relationship: many_to_one
        sql: |
          {CUBE}.venta = {ventas.numeroVenta}
          AND {CUBE}.sucursal = {ventas.sucursal}

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.articulo || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true
        title: "ID Partida"

      - name: venta
        sql: "{CUBE}.venta"
        type: string
        title: "Número Venta"

      - name: impuesto_value
        sql: "{CUBE}.impuesto_value"
        type: number
        title: "Monto Impuesto Unitario ($)"

      - name: impuesto
        sql: "{CUBE}.impuesto"
        type: number
        title: "Impuesto Unitario ($)"

      - name: skuRaw
        sql: "{CUBE}.articulo"
        type: string
        title: "SKU (Ticket)"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: fecha
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha"

      - name: is_viable
        sql: "{CUBE}.is_viable"
        type: boolean
        title: "Es Viable"

      - name: precio
        sql: "{CUBE}.precio"
        type: number
        title: "Precio Unitario"

      - name: cantidad_dim
        sql: "{CUBE}.cantidad"
        type: number
        title: "Cantidad"

      - name: costo_unitario_calc
        sql: |
          CASE 
            WHEN {CUBE}.costo <= 0 OR {CUBE}.costo > {CUBE}.precio 
            THEN {CUBE}.precio * 0.80
            ELSE {CUBE}.costo
          END
        type: number

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1  THEN 'Enero'      WHEN 2  THEN 'Febrero'    WHEN 3  THEN 'Marzo'
            WHEN 4  THEN 'Abril'      WHEN 5  THEN 'Mayo'       WHEN 6  THEN 'Junio'
            WHEN 7  THEN 'Julio'      WHEN 8  THEN 'Agosto'     WHEN 9  THEN 'Septiembre'
            WHEN 10 THEN 'Octubre'    WHEN 11 THEN 'Noviembre'  WHEN 12 THEN 'Diciembre'
          END
        type: string
        title: "Mes"

      - name: diaSemana
        sql: "EXTRACT(DOW FROM {CUBE}.partition_date)"
        type: number
        title: "Día Semana"

      - name: descuento
        sql: "COALESCE({CUBE}.descuento, 0)"
        type: number
        title: "Descuento por Artículo"

    measures:
      # FIX 2025-04 — Agregado filtro tipo_doc IN ('FAC','DV','DEV','REM')
      # Alineado con reporte original: CODIGO_Ventas_por_Articulo_por_impuesto.txt
      # Sin este filtro, ABASTOS MAYOREO incluía documentos PE/TIC que duplicaban
      # partidas de G0 (~$6,303 de diferencia detectada el 22-abril-2026).
      - name: ingresoTotalViable
        sql: "{CUBE}.precio * {CUBE}.cantidad * (1 - COALESCE({CUBE}.descuento, 0) / 100.0)"
        type: sum
        format: currency
        title: "Ingreso Bruto"
        filters:
          - sql: |
              {CUBE}.is_viable = true
              AND {ventas.tipoDocumento} IN ('FAC', 'DV', 'DEV', 'REM')

      - name: descuentoTotal
        sql: "COALESCE({CUBE}.descuento, 0)"
        type: sum
        format: currency
        title: "Total Descuentos"
        filters:
          - sql: |
              {CUBE}.is_viable = true
              AND {ventas.tipoDocumento} IN ('FAC', 'DV', 'DEV', 'REM')

      # Cálculo: precio * cantidad * (1 - descuento/100) * 0.16
      # Solo para artículos con impuesto = 16 (IVA)
      - name: impuestoIVA16
        sql: |
          CASE WHEN {CUBE}.impuesto = 16
          THEN {CUBE}.precio
               * {CUBE}.cantidad
               * (1 - COALESCE({CUBE}.descuento, 0) / 100.0)
               * 0.16
          ELSE 0 END
        type: sum
        format: currency
        title: "IVA 16%"
        filters:
          - sql: |
              {CUBE}.is_viable = true
              AND {ventas.tipoDocumento} IN ('FAC', 'DV', 'DEV', 'REM')

      # Cálculo: precio * cantidad * (1 - descuento/100) * 0.08
      # Solo para artículos con impuesto = 8 (IEPS)
      - name: impuestoIEPS8
        sql: |
          CASE WHEN {CUBE}.impuesto = 8
          THEN {CUBE}.precio
               * {CUBE}.cantidad
               * (1 - COALESCE({CUBE}.descuento, 0) / 100.0)
               * 0.08
          ELSE 0 END
        type: sum
        format: currency
        title: "IEPS 8%"
        filters:
          - sql: |
              {CUBE}.is_viable = true
              AND {ventas.tipoDocumento} IN ('FAC', 'DV', 'DEV', 'REM')

      # Suma de IVA 16% + IEPS 8%
      - name: totalImpuestosCalculados
        sql: |
          CASE
            WHEN {CUBE}.impuesto = 16
            THEN {CUBE}.precio
                 * {CUBE}.cantidad
                 * (1 - COALESCE({CUBE}.descuento, 0) / 100.0)
                 * 0.16
            WHEN {CUBE}.impuesto = 8
            THEN {CUBE}.precio
                 * {CUBE}.cantidad
                 * (1 - COALESCE({CUBE}.descuento, 0) / 100.0)
                 * 0.08
            ELSE 0
          END
        type: sum
        format: currency
        title: "Total Impuestos"
        filters:
          - sql: |
              {CUBE}.is_viable = true
              AND {ventas.tipoDocumento} IN ('FAC', 'DV', 'DEV', 'REM')

      # conteoTickets y cantidadVendida no filtran por tipo_doc
      # para mantener visibilidad completa de operaciones
      - name: conteoTickets
        sql: "{CUBE}.venta"
        type: count_distinct
        title: "# Tickets"
        filters: [{ sql: "{CUBE}.is_viable = true" }]

      - name: cantidadVendida
        sql: "{CUBE}.cantidad"
        type: sum
        title: "Unidades Vendidas"
        filters: [{ sql: "{CUBE}.is_viable = true" }]
