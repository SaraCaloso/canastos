# =============================================================================
# CUBO: reconciliacionCortesZ
# =============================================================================
# Este cubo representa los CORTES Z AGREGADOS por día y sucursal.
# A diferencia de cortesDiarios (que expone un registro por corte individual),
# este cubo pre-agrega en el SQL para obtener UNA sola fila por fecha+sucursal,
# lo que facilita la reconciliación directa contra el cubo de ventas del sistema.
#
# Fuente de datos: canastos_tfx.tfx_table_cortes
#
# FILTROS APLICADOS EN LA FUENTE:
#   - Solo cortes tipo 'z' (cierres de día; excluye cortes X parciales)
#   - Excluye estación 'COBRANZA' (pagos de crédito, no ventas de mostrador)
#   - Excluye 'DPBodega-Test' (entorno de pruebas)
#   - Excluye 'TORREON ARCOIRIS' (schema drift que rompe TRY_CAST)
#
#
# Relación con otros cubos:
#   → Se une con "reconciliacionVentasDiarias" por fecha + sucursal (one_to_one)
#     para comparar ventas del sistema contra lo reportado en caja.
# =============================================================================

cubes:
  - name: reconciliacionCortesZ
    title: "Cortes Z Diarios (Reconciliación)"
    description: |
      Cortes Z agregados por día y sucursal para reconciliación con ventas del sistema.

      FILTROS APLICADOS:
      - Solo cortes tipo 'z' (cierre de día)
      - Excluye estación 'COBRANZA'
      - Excluye 'DPBodega-Test' y 'TORREON ARCOIRIS' (schema drift)
      - Agrupación: día + sucursal

      FIX 2026-04: Reemplazado workaround de fecha por TRY_CAST + exclusión de sucursal.
      Ahora incluye datos desde 2025-11-20 en adelante.

    # La agregación ocurre directamente en el SQL base (GROUP BY fecha + sucursal).
    # Esto garantiza que el cubo exponga exactamente un registro por día/sucursal,
    # simplificando el join con reconciliacionVentasDiarias.
    sql: |
      SELECT
        partition_date                                                    AS fecha,
        sucursal,

        -- Ventas e ingresos
        SUM(TRY_CAST(totalventas      AS DOUBLE))                        AS ventas_z,          -- Total vendido según cortes Z del día
        SUM(TRY_CAST(totalcaja        AS DOUBLE))                        AS efectivo_caja,     -- Efectivo físico contado en todas las cajas
        SUM(TRY_CAST(totalcaja        AS DOUBLE))
          - SUM(TRY_CAST(totalventas  AS DOUBLE))                        AS diferencia_z,      -- Faltante/sobrante: efectivo - ventas
        SUM(TRY_CAST(totalingresos    AS DOUBLE))                        AS total_ingresos,    -- Total ingresos por todas las formas de pago
        SUM(TRY_CAST(totalingresos    AS DOUBLE))
          - SUM(TRY_CAST(totalcaja    AS DOUBLE))                        AS retiros_efectivo,  -- Ingresos no en efectivo (tarjeta/crédito)

        -- Desglose IVA 16% y 0%
        SUM(TRY_CAST(ventasimpuesto10 AS DOUBLE))                        AS ventas_impuesto10, -- Base gravable al 16%
        SUM(TRY_CAST(impuesto10       AS DOUBLE))                        AS impuesto10_sum,    -- Monto IVA 16%
        SUM(TRY_CAST(ventasimpuesto15 AS DOUBLE))                        AS ventas_impuesto15, -- Ventas exentas (tasa 0%)
        SUM(TRY_CAST(impuesto15       AS DOUBLE))                        AS impuesto15_sum,    -- IVA 0% (siempre cero, requerido por estructura)

        -- Tasa 8% (IEPS) derivada por diferencia:
        -- No existe columna propia en la tabla origen.
        -- Se obtiene restando las ventas al 16% y las exentas del total,
        -- y dividiendo entre 1.08 para extraer la base sin impuesto.
        (
          SUM(TRY_CAST(totalventas      AS DOUBLE))
          - SUM(TRY_CAST(impuesto15     AS DOUBLE))
          - SUM(TRY_CAST(impuesto10     AS DOUBLE))
          - SUM(TRY_CAST(ventasimpuesto10 AS DOUBLE))
          - SUM(TRY_CAST(ventasimpuesto15 AS DOUBLE))
        ) / 1.08                                                          AS ventas8,           -- Base gravable IEPS 8%
        (
          (
            SUM(TRY_CAST(totalventas      AS DOUBLE))
            - SUM(TRY_CAST(impuesto15     AS DOUBLE))
            - SUM(TRY_CAST(impuesto10     AS DOUBLE))
            - SUM(TRY_CAST(ventasimpuesto10 AS DOUBLE))
            - SUM(TRY_CAST(ventasimpuesto15 AS DOUBLE))
          ) / 1.08
        ) * 0.08                                                          AS impuesto8,         -- Monto IEPS 8% = ventas8 × 0.08

        -- Métricas operativas
        SUM(TRY_CAST(clientesatendidos AS INTEGER))                       AS clientes_atendidos,
        COUNT(*)                                                          AS num_cortes_z        -- Número de cajas que hicieron corte Z ese día
      FROM canastos_tfx.tfx_table_cortes
      WHERE corte = 'z'                          -- Solo cierres de día
        AND sucursal != 'DPBodega-Test'          -- Excluir entorno de pruebas
        AND (estacion IS NULL OR estacion != 'COBRANZA')  -- Excluir pagos de crédito
      GROUP BY partition_date, sucursal          -- Una fila por día + sucursal

    public: false # Solo para uso interno; no exponer en playground público

    # -------------------------------------------------------------------------
    # JOINS
    # -------------------------------------------------------------------------
    joins:
      # Join con el cubo de ventas diarias del sistema para reconciliación.
      # Es one_to_one porque ambos cubos ya están agregados por fecha + sucursal.
      - name: reconciliacionVentasDiarias
        relationship: one_to_one
        sql: "{CUBE}.fecha = {reconciliacionVentasDiarias.fecha} AND {CUBE}.sucursal = {reconciliacionVentasDiarias.sucursal}"

    # -------------------------------------------------------------------------
    # DIMENSIONES
    # -------------------------------------------------------------------------
    dimensions:
      # Llave primaria compuesta: fecha + sucursal en texto.
      # Garantiza unicidad dado que el SQL ya agrupa por esos dos campos.
      - name: id
        sql: "CAST({CUBE}.fecha AS VARCHAR) || '-' || {CUBE}.sucursal"
        type: string
        primary_key: true
        title: "ID Agregado"

      # Fecha del cierre; es la misma partition_date del archivo Parquet origen.
      - name: fecha
        sql: "{CUBE}.fecha"
        type: time
        title: "Fecha"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

    # -------------------------------------------------------------------------
    # MEDIDAS
    # -------------------------------------------------------------------------
    measures:
      # -----------------------------------------------------------------------
      # Ventas e ingresos
      # -----------------------------------------------------------------------

      # Total vendido según los cortes Z del día en la sucursal.
      - name: ventasZ
        sql: "{CUBE}.ventas_z"
        type: sum
        format: currency
        title: "Ventas Reportadas (Z)"

      # Efectivo físico contado en todas las cajas de la sucursal.
      - name: efectivoCaja
        sql: "{CUBE}.efectivo_caja"
        type: sum
        format: currency
        title: "Efectivo en Caja"

      # Faltante o sobrante del día: efectivo contado menos ventas reportadas.
      # Valor negativo = faltante; valor positivo = sobrante.
      - name: diferenciaZ
        sql: "{CUBE}.diferencia_z"
        type: sum
        format: currency
        title: "Diferencia Z (Efectivo - Ventas)"

      # Suma de todas las formas de pago recibidas en el día.
      - name: totalIngresos
        sql: "{CUBE}.total_ingresos"
        type: sum
        format: currency
        title: "Total Ingresos"

      # Ingresos no cobrados en efectivo (tarjeta, crédito, transferencia).
      # Se calcula como: total_ingresos - efectivo_caja.
      - name: retirosEfectivo
        sql: "{CUBE}.retiros_efectivo"
        type: sum
        format: currency
        title: "Retiros de Efectivo"
        description: "Total Ingresos - Efectivo en Caja"

      # -----------------------------------------------------------------------
      # Desglose de impuestos
      # -----------------------------------------------------------------------

      # Base gravable sobre la que se aplica el 16% de IVA.
      - name: ventasImpuesto10
        sql: "{CUBE}.ventas_impuesto10"
        type: sum
        format: currency
        title: "Ventas Base 16%"

      # Monto de IVA cobrado al 16%.
      - name: impuesto10
        sql: "{CUBE}.impuesto10_sum"
        type: sum
        format: currency
        title: "IVA 16%"

      # Productos exentos de IVA (ej: alimentos sin procesar).
      - name: ventasImpuesto15
        sql: "{CUBE}.ventas_impuesto15"
        type: sum
        format: currency
        title: "Ventas Exentas (0%)"

      # Siempre cero; se conserva por consistencia de esquema con el sistema origen.
      - name: impuesto15
        sql: "{CUBE}.impuesto15_sum"
        type: sum
        format: currency
        title: "IVA 0%"

      # Base gravable IEPS calculada por diferencia en el SQL base.
      # Ver comentario en el bloque SQL para detalle de la fórmula.
      - name: ventas8
        sql: "{CUBE}.ventas8"
        type: sum
        format: currency
        title: "Ventas Base 8% (IEPS)"

      # Monto de IEPS = ventas8 × 0.08, pre-calculado en el SQL base.
      - name: impuesto8
        sql: "{CUBE}.impuesto8"
        type: sum
        format: currency
        title: "IEPS 8%"

      # Suma de los tres impuestos desglosados: IVA 0% + IEPS 8% + IVA 16%.
      # Útil para validar que la suma de impuestos cuadra contra el total de ventas.
      - name: totalImpuestosDesglosados
        sql: "{CUBE}.impuesto15_sum + {CUBE}.impuesto10_sum + {CUBE}.impuesto8"
        type: sum
        format: currency
        title: "Total Impuestos (0%+8%+16%)"

      # -----------------------------------------------------------------------
      # Métricas operativas
      # -----------------------------------------------------------------------

      - name: clientesAtendidos
        sql: "{CUBE}.clientes_atendidos"
        type: sum
        title: "# Clientes Atendidos"

      # Número de cajas que realizaron corte Z en el día para esa sucursal.
      # Si es menor al esperado, puede indicar cajas que no cerraron.
      - name: numCortesZ
        sql: "{CUBE}.num_cortes_z"
        type: sum
        title: "# Cortes Z"

      # NULLIF evita división por cero cuando no se registraron clientes.
      - name: ticketPromedioZ
        sql: "{CUBE}.ventas_z / NULLIF({CUBE}.clientes_atendidos, 0)"
        type: avg
        format: currency
        title: "Ticket Promedio (Z)"
