cubes:
  - name: reconciliacionCortesZ
    title: "Cortes Z Diarios (Reconciliación)"
    description: |
      Cortes Z agregados por día y sucursal para reconciliación con ventas del sistema.

      FILTROS APLICADOS:
      - Solo cortes tipo 'z' (cierre de día)
      - Excluye estación 'COBRANZA'
      - Excluye 'DPBodega-Test' y 'TORREON ARCOIRIS' (schema drift)
      - Agrupación: día + sucursal

      FIX 2026-04: Reemplazado workaround de fecha por TRY_CAST + exclusión de sucursal.
      Ahora incluye datos desde 2025-11-20 en adelante.

    sql: |
      SELECT
        partition_date                                                    AS fecha,
        sucursal,
        SUM(TRY_CAST(totalventas      AS DOUBLE))                        AS ventas_z,
        SUM(TRY_CAST(totalcaja        AS DOUBLE))                        AS efectivo_caja,
        SUM(TRY_CAST(totalcaja        AS DOUBLE))
          - SUM(TRY_CAST(totalventas  AS DOUBLE))                        AS diferencia_z,
        SUM(TRY_CAST(totalingresos    AS DOUBLE))                        AS total_ingresos,
        SUM(TRY_CAST(totalingresos    AS DOUBLE))
          - SUM(TRY_CAST(totalcaja    AS DOUBLE))                        AS retiros_efectivo,
        SUM(TRY_CAST(ventasimpuesto10 AS DOUBLE))                        AS ventas_impuesto10,
        SUM(TRY_CAST(impuesto10       AS DOUBLE))                        AS impuesto10_sum,
        SUM(TRY_CAST(ventasimpuesto15 AS DOUBLE))                        AS ventas_impuesto15,
        SUM(TRY_CAST(impuesto15       AS DOUBLE))                        AS impuesto15_sum,
        -- Tasa 8% derivada
        (
          SUM(TRY_CAST(totalventas      AS DOUBLE))
          - SUM(TRY_CAST(impuesto15     AS DOUBLE))
          - SUM(TRY_CAST(impuesto10     AS DOUBLE))
          - SUM(TRY_CAST(ventasimpuesto10 AS DOUBLE))
          - SUM(TRY_CAST(ventasimpuesto15 AS DOUBLE))
        ) / 1.08                                                          AS ventas8,
        (
          (
            SUM(TRY_CAST(totalventas      AS DOUBLE))
            - SUM(TRY_CAST(impuesto15     AS DOUBLE))
            - SUM(TRY_CAST(impuesto10     AS DOUBLE))
            - SUM(TRY_CAST(ventasimpuesto10 AS DOUBLE))
            - SUM(TRY_CAST(ventasimpuesto15 AS DOUBLE))
          ) / 1.08
        ) * 0.08                                                          AS impuesto8,
        SUM(TRY_CAST(clientesatendidos AS INTEGER))                       AS clientes_atendidos,
        COUNT(*)                                                          AS num_cortes_z
      FROM canastos_tfx.tfx_table_cortes
      WHERE corte = 'z'
        AND sucursal != 'DPBodega-Test'
        AND sucursal != 'TORREON ARCOIRIS'
        AND (estacion IS NULL OR estacion != 'COBRANZA')
      GROUP BY partition_date, sucursal

    public: false

    joins:
      - name: reconciliacionVentasDiarias
        relationship: one_to_one
        sql: "{CUBE}.fecha = {reconciliacionVentasDiarias.fecha} AND {CUBE}.sucursal = {reconciliacionVentasDiarias.sucursal}"

    dimensions:
      - name: id
        sql: "CAST({CUBE}.fecha AS VARCHAR) || '-' || {CUBE}.sucursal"
        type: string
        primary_key: true
        title: "ID Agregado"

      - name: fecha
        sql: "{CUBE}.fecha"
        type: time
        title: "Fecha"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

    measures:
      - name: ventasZ
        sql: "{CUBE}.ventas_z"
        type: sum
        format: currency
        title: "Ventas Reportadas (Z)"

      - name: efectivoCaja
        sql: "{CUBE}.efectivo_caja"
        type: sum
        format: currency
        title: "Efectivo en Caja"

      - name: diferenciaZ
        sql: "{CUBE}.diferencia_z"
        type: sum
        format: currency
        title: "Diferencia Z (Efectivo - Ventas)"

      - name: totalIngresos
        sql: "{CUBE}.total_ingresos"
        type: sum
        format: currency
        title: "Total Ingresos"

      - name: retirosEfectivo
        sql: "{CUBE}.retiros_efectivo"
        type: sum
        format: currency
        title: "Retiros de Efectivo"
        description: "Total Ingresos - Efectivo en Caja"

      - name: ventasImpuesto10
        sql: "{CUBE}.ventas_impuesto10"
        type: sum
        format: currency
        title: "Ventas Base 16%"

      - name: impuesto10
        sql: "{CUBE}.impuesto10_sum"
        type: sum
        format: currency
        title: "IVA 16%"

      - name: ventasImpuesto15
        sql: "{CUBE}.ventas_impuesto15"
        type: sum
        format: currency
        title: "Ventas Exentas (0%)"

      - name: impuesto15
        sql: "{CUBE}.impuesto15_sum"
        type: sum
        format: currency
        title: "IVA 0%"

      # ── Tasa 8% ────────────────────────────────────────────────────────────
      - name: ventas8
        sql: "{CUBE}.ventas8"
        type: sum
        format: currency
        title: "Ventas Base 8% (IEPS)"

      - name: impuesto8
        sql: "{CUBE}.impuesto8"
        type: sum
        format: currency
        title: "IEPS 8%"

      - name: totalImpuestosDesglosados
        sql: "{CUBE}.impuesto15_sum + {CUBE}.impuesto10_sum + {CUBE}.impuesto8"
        type: sum
        format: currency
        title: "Total Impuestos (0%+8%+16%)"

      - name: clientesAtendidos
        sql: "{CUBE}.clientes_atendidos"
        type: sum
        title: "# Clientes Atendidos"

      - name: numCortesZ
        sql: "{CUBE}.num_cortes_z"
        type: sum
        title: "# Cortes Z"

      - name: ticketPromedioZ
        sql: "{CUBE}.ventas_z / NULLIF({CUBE}.clientes_atendidos, 0)"
        type: avg
        format: currency
        title: "Ticket Promedio (Z)"
