# =============================================================================
# CUBO: historicoInventario
# =============================================================================
# Este cubo representa los SNAPSHOTS HISTÓRICOS DE INVENTARIO por artículo,
# sucursal y fecha de partición. Cada registro es la existencia de un SKU
# en una ubicación en un día específico.
#
# Fuente de datos: canastos_tfx.tfx_table_inv (enriquecida con tfx_table_partvta)
#
# ENRIQUECIMIENTO CON PRECIO Y COSTO:
#   La tabla de inventario no tiene precio ni costo propios.
#   Se hace un LEFT JOIN con tfx_table_partvta para traer:
#     - precio_lista:   MAX(precio) por artículo (precio de venta al público)
#     - costo_ajustado: AVG(costo saneado) por artículo
#   El costo se sanea con un CASE: si es ≤0 o mayor al precio, se estima
#   como el 80% del precio de lista para evitar márgenes negativos o inválidos.
#   TRY_CAST en el JOIN tolera discrepancias de tipo entre las dos tablas.
#
#  ADVERTENCIA CEDIS:
#   El CEDIS concentra 70-80% del stock total. Sin segmentar,
#   los totales están dominados por la bodega y no reflejan las tiendas.
#   Usar el segmento 'soloTiendas' para análisis por punto de venta.
#
# Relación con otros cubos:
#   → No tiene joins declarados; es un cubo autónomo de inventario.
#   → La vista "estadoInventario" lo consume como fuente principal.
# =============================================================================

cubes:
  - name: historicoInventario
    title: "Historico de Inventario"

    # ANTERIOR: sql_table: canastos_tfx.tfx_table_inv (sin precio ni costo)
    # ACTUAL:   LEFT JOIN con partvta para enriquecer con precio y costo.
    sql: |
      SELECT
        inv.*,
        p.precio_lista,
        p.costo_ajustado
      FROM canastos_tfx.tfx_table_inv AS inv
      LEFT JOIN (
        -- Subconsulta: obtiene el último precio y costo promedio por artículo.
        -- Se agrupa por artículo porque el mismo SKU puede aparecer en múltiples
        -- partidas de venta con precios o costos ligeramente distintos.
        SELECT
          articulo,
          MAX(precio) AS precio_lista,           -- Precio máximo como referencia de lista
          AVG(CASE
            WHEN costo <= 0 OR costo > precio    -- Costo inválido: cero, negativo o mayor al precio
              THEN precio * 0.80                 -- Fallback: estimar el 80% del precio de lista
            ELSE costo                           -- Costo válido: usar el valor real
          END) AS costo_ajustado
        FROM canastos_tfx.tfx_table_partvta
        WHERE is_viable = true   -- Solo productos activos/viables en el catálogo
        GROUP BY articulo
      ) AS p
        -- TRY_CAST tolera que articulo sea string en inv y número en partvta.
        ON CAST(inv.articulo AS BIGINT) = TRY_CAST(p.articulo AS BIGINT)

    joins: [] # Sin relaciones a otros cubos por ahora

    # -------------------------------------------------------------------------
    # DIMENSIONES
    # -------------------------------------------------------------------------
    dimensions:
      # Llave primaria compuesta: artículo + sucursal + fecha.
      # Los tres campos juntos garantizan unicidad del snapshot histórico.
      - name: id
        sql: "CAST({CUBE}.articulo AS VARCHAR) || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true
        title: "ID Historico"

      # SKU casteado a VARCHAR para compatibilidad con joins de texto.
      - name: sku
        sql: "CAST({CUBE}.articulo AS VARCHAR)"
        type: string
        title: "SKU"

      # Sucursal o bodega donde se tomó el snapshot.
      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: marca
        sql: "{CUBE}.marca"
        type: string
        title: "Marca"

      # Línea o categoría del producto según el catálogo de inventario.
      - name: linea
        sql: "{CUBE}.linea"
        type: string
        title: "Línea"

      # Nombre descriptivo del artículo.
      - name: producto
        sql: "{CUBE}.descrip"
        type: string
        title: "Producto"

      # -----------------------------------------------------------------------
      # Dimensiones de tiempo
      # partition_date es la fecha oficial del snapshot de inventario.
      # -----------------------------------------------------------------------

      - name: fechaCaptura
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha Corte Inventario"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      # Útil para ordenar cronológicamente en gráficas y tablas.
      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      # Nombre legible para etiquetas en reportes y dashboards.
      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1 THEN 'January'   WHEN 2  THEN 'February'  WHEN 3  THEN 'March'
            WHEN 4 THEN 'April'     WHEN 5  THEN 'May'        WHEN 6  THEN 'June'
            WHEN 7 THEN 'July'      WHEN 8  THEN 'August'     WHEN 9  THEN 'September'
            WHEN 10 THEN 'October'  WHEN 11 THEN 'November'   WHEN 12 THEN 'December'
          END
        type: string
        title: "Mes"

      # DOW: 0 = Sunday ... 6 = Saturday (convención PostgreSQL/Trino).
      - name: diaSemana
        sql: |
          CASE EXTRACT(DOW FROM {CUBE}.partition_date)
            WHEN 0 THEN 'Sunday'    WHEN 1 THEN 'Monday'    WHEN 2 THEN 'Tuesday'
            WHEN 3 THEN 'Wednesday' WHEN 4 THEN 'Thursday'  WHEN 5 THEN 'Friday'
            WHEN 6 THEN 'Saturday'
          END
        type: string
        title: "Día Semana"

      # Unidad de medida del artículo en inventario (KG, PZ, LT, etc.).
      - name: unidadMedida
        sql: "{CUBE}.unidad"
        type: string
        title: "Unidad de Medida"
        description: "KG, PZ, LT, etc."

      # Clasifica cada sucursal en su canal operativo.
      # Útil para filtrar o agrupar por canal de distribución.
      - name: tipoUbicacion
        sql: |
          CASE
            WHEN {CUBE}.sucursal = 'CEDIS'              THEN 'CEDIS'
            WHEN {CUBE}.sucursal LIKE '%MAYOREO%'       THEN 'MAYOREO'
            WHEN {CUBE}.sucursal LIKE '%MENUDEO%'       THEN 'MENUDEO'
            ELSE 'TIENDA'
          END
        type: string
        title: "Tipo de Ubicación"
        description: "CEDIS, MAYOREO, MENUDEO, o TIENDA"

    # -------------------------------------------------------------------------
    # SEGMENTOS
    # -------------------------------------------------------------------------
    segments:
      # Excluye CEDIS y canales de distribución; deja solo puntos de venta al público.
      # Recomendado para análisis de disponibilidad en tiendas.
      - name: soloTiendas
        sql: |
          {CUBE}.sucursal != 'CEDIS'
          AND {CUBE}.sucursal NOT LIKE '%MAYOREO%'
          AND {CUBE}.sucursal NOT LIKE '%MENUDEO%'
        title: "Solo Tiendas (sin CEDIS ni Mayoreo/Menudeo)"

      # Muestra únicamente el stock de la bodega central.
      # Útil para análisis de reposición y capacidad de distribución.
      - name: soloCEDIS
        sql: "{CUBE}.sucursal = 'CEDIS'"
        title: "Solo CEDIS"

      # Filtra artículos con existencia real mayor a cero.
      # Útil para análisis de disponibilidad efectiva de producto.
      - name: inventarioPositivo
        sql: "{CUBE}.existencia > 0"
        title: "Solo Inventario Positivo"

      # Existencias negativas indican ventas sin reposición registrada
      # o errores de captura que deben revisarse con operaciones.
      - name: inventarioNegativo
        sql: "{CUBE}.existencia < 0"
        title: "Solo Inventario Negativo (Faltantes)"

    # -------------------------------------------------------------------------
    # MEDIDAS
    # -------------------------------------------------------------------------
    measures:
      # Suma total de existencias en todas las ubicaciones y fechas del filtro.
      # Incluye CEDIS por defecto; aplicar soloTiendas para análisis por canal.
      - name: cantidadStock
        sql: "{CUBE}.existencia"
        type: sum
        title: "Unidades en Stock"
        description: "Suma de existencias. Puede incluir CEDIS y todas las sucursales."

      # Promedio de existencias por ubicación en el período seleccionado.
      # Útil para detectar ubicaciones con stock crónicamente bajo o alto.
      - name: stockPromedio
        sql: "{CUBE}.existencia"
        type: avg
        title: "Stock Promedio por Ubicación"

      # Número de sucursales distintas donde hay al menos un registro del SKU.
      # No distingue entre existencia positiva y negativa; combinar con segmentos.
      - name: numUbicaciones
        sql: "{CUBE}.sucursal"
        type: count_distinct
        title: "# Ubicaciones"
        description: "Número de sucursales/ubicaciones con este producto"

      # Mínimo de existencias en el período; útil para detectar quiebres de stock.
      - name: stockMinimo
        sql: "{CUBE}.existencia"
        type: min
        title: "Stock Mínimo"

      # Máximo de existencias en el período; útil para detectar sobrestock.
      - name: stockMaximo
        sql: "{CUBE}.existencia"
        type: max
        title: "Stock Máximo"

      # Precio al público incluyendo IVA 16%.
      # Se usa MAX para obtener el precio más reciente por artículo.
      # Ajustar el multiplicador (1.16) si aplica una tasa distinta al 16%.
      - name: precioConImpuesto
        sql: "{CUBE}.precio_lista * 1.16"
        type: max
        format: currency
        title: "Precio (con Impuesto)"

      # Costo unitario ya saneado por la subconsulta del SQL base.
      # Si el costo original era inválido (≤0 o mayor al precio), se usó el 80%.
      - name: costoUnitario
        sql: "{CUBE}.costo_ajustado"
        type: max
        format: currency
        title: "Costo Unitario"
