cubes:
  - name: historicoInventario
    title: "Historico de Inventario"
    # ANTERIOR SQL
    # sql_table: canastos_tfx.tfx_table_inv
    # NUEVO SQL
    sql: |
      SELECT 
        inv.*,
        p.precio_lista,
        p.costo_ajustado
      FROM canastos_tfx.tfx_table_inv AS inv
      LEFT JOIN (
        -- Esta subconsulta obtiene el último precio y costo por artículo y sucursal
        -- Evitamos duplicados agrupando aquí mismo
        SELECT 
          articulo,
          MAX(precio) as precio_lista,
          AVG(CASE 
            WHEN costo <= 0 OR costo > precio THEN precio * 0.80 
            ELSE costo 
          END) as costo_ajustado
        FROM canastos_tfx.tfx_table_partvta
        WHERE is_viable = true
        GROUP BY articulo
      ) AS p ON CAST(inv.articulo AS VARCHAR) = TRY_CAST(p.articulo AS BIGINT)
    public: true

    joins: []

    dimensions:
      - name: id
        sql: "CAST({CUBE}.articulo AS VARCHAR) || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true
        title: "ID Historico"

      - name: sku
        sql: "CAST({CUBE}.articulo AS VARCHAR)"
        type: string
        title: "SKU"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"
      
      - name: marca
        sql: "{CUBE}.marca"
        type: string
        title: "Marca"
      
      - name: linea
        sql: "{CUBE}.linea"
        type: string
        title: "Línea"
      
      - name: producto
        sql: "{CUBE}.descrip"
        type: string
        title: "Producto"
        
      - name: fechaCaptura
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha Corte Inventario"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1 THEN 'January'
            WHEN 2 THEN 'February'
            WHEN 3 THEN 'March'
            WHEN 4 THEN 'April'
            WHEN 5 THEN 'May'
            WHEN 6 THEN 'June'
            WHEN 7 THEN 'July'
            WHEN 8 THEN 'August'
            WHEN 9 THEN 'September'
            WHEN 10 THEN 'October'
            WHEN 11 THEN 'November'
            WHEN 12 THEN 'December'
          END
        type: string
        title: "Mes"

      - name: diaSemana
        sql: |
          CASE EXTRACT(DOW FROM {CUBE}.partition_date)
            WHEN 0 THEN 'Sunday'
            WHEN 1 THEN 'Monday'
            WHEN 2 THEN 'Tuesday'
            WHEN 3 THEN 'Wednesday'
            WHEN 4 THEN 'Thursday'
            WHEN 5 THEN 'Friday'
            WHEN 6 THEN 'Saturday'
          END
        type: string
        title: "Día Semana"
      
      - name: unidadMedida
        sql: "{CUBE}.unidad"
        type: string
        title: "Unidad de Medida"
        description: "KG, PZ, LT, etc."
      
      - name: tipoUbicacion
        sql: |
          CASE 
            WHEN {CUBE}.sucursal = 'CEDIS' THEN 'CEDIS'
            WHEN {CUBE}.sucursal LIKE '%MAYOREO%' THEN 'MAYOREO'
            WHEN {CUBE}.sucursal LIKE '%MENUDEO%' THEN 'MENUDEO'
            ELSE 'TIENDA'
          END
        type: string
        title: "Tipo de Ubicación"
        description: "CEDIS, MAYOREO, MENUDEO, o TIENDA"

    segments:
      - name: soloTiendas
        sql: |
          {CUBE}.sucursal != 'CEDIS' 
          AND {CUBE}.sucursal NOT LIKE '%MAYOREO%' 
          AND {CUBE}.sucursal NOT LIKE '%MENUDEO%'
        title: "Solo Tiendas (sin CEDIS ni Mayoreo/Menudeo)"
      
      - name: soloCEDIS
        sql: "{CUBE}.sucursal = 'CEDIS'"
        title: "Solo CEDIS"
      
      - name: inventarioPositivo
        sql: "{CUBE}.existencia > 0"
        title: "Solo Inventario Positivo"
      
      - name: inventarioNegativo
        sql: "{CUBE}.existencia < 0"
        title: "Solo Inventario Negativo (Faltantes)"

    measures:
      - name: cantidadStock
        sql: "{CUBE}.existencia"
        type: sum
        title: "Unidades en Stock"
        description: "Suma de existencias. Puede incluir CEDIS y todas las sucursales."
      
      - name: stockPromedio
        sql: "{CUBE}.existencia"
        type: avg
        title: "Stock Promedio por Ubicación"
      
      - name: numUbicaciones
        sql: "{CUBE}.sucursal"
        type: count_distinct
        title: "# Ubicaciones"
        description: "Número de sucursales/ubicaciones con este producto"
      
      - name: stockMinimo
        sql: "{CUBE}.existencia"
        type: min
        title: "Stock Mínimo"
      
      - name: stockMaximo
        sql: "{CUBE}.existencia"
        type: max
        title: "Stock Máximo"

        # --- NUEVAS DIMENSIONES ---
      - name: precioConImpuesto
        sql: "{CUBE}.precio_lista * 1.16" # Ajusta el 1.16 si el IVA es distinto
        type: max
        title: "Precio (con Impuesto)"
        format: currency

      - name: costoUnitario
        sql: "{CUBE}.costo_ajustado"
        type: max
        title: "Costo Unitario"
        format: currency
