cubes:
  - name: ventasPorDocumento
    title: "Ventas por Tipo de Documento"
    description: "Ventas detalladas por tipo de documento (REM, FAC, DEV) para análisis de devoluciones y facturación"
    sql_table: canastos_tfx.tfx_table_ventas
    public: false

    joins: []

    dimensions:
      # --- PK OBLIGATORIA ---
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.sucursal"
        type: string
        primary_key: true
        title: "ID Venta"

      # --- Dimensiones Básicas ---
      - name: numeroVenta
        sql: "{CUBE}.venta"
        type: string
        title: "Número de Venta"
        description: "Folio de la venta"

      - name: fechaVenta
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha de Venta"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1 THEN 'January'
            WHEN 2 THEN 'February'
            WHEN 3 THEN 'March'
            WHEN 4 THEN 'April'
            WHEN 5 THEN 'May'
            WHEN 6 THEN 'June'
            WHEN 7 THEN 'July'
            WHEN 8 THEN 'August'
            WHEN 9 THEN 'September'
            WHEN 10 THEN 'October'
            WHEN 11 THEN 'November'
            WHEN 12 THEN 'December'
          END
        type: string
        title: "Mes"

      - name: diaSemana
        sql: |
          CASE EXTRACT(DOW FROM {CUBE}.partition_date)
            WHEN 0 THEN 'Sunday'
            WHEN 1 THEN 'Monday'
            WHEN 2 THEN 'Tuesday'
            WHEN 3 THEN 'Wednesday'
            WHEN 4 THEN 'Thursday'
            WHEN 5 THEN 'Friday'
            WHEN 6 THEN 'Saturday'
          END
        type: string
        title: "Día Semana"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: tipoDocumento
        sql: "{CUBE}.tipo_doc"
        type: string
        title: "Tipo de Documento"
        description: "REM (Remisión/Venta), FAC (Factura), DEV (Devolución), DV (Devolución Parcial)"

      - name: estado
        sql: "{CUBE}.estado"
        type: string
        title: "Estado"
        description: "Estado del documento (CO=Completado, CA=Cancelado, etc)"

      - name: cliente
        sql: "{CUBE}.cliente"
        type: string
        title: "Cliente"

      - name: serieDocumento
        sql: "{CUBE}.seriedocumento"
        type: string
        title: "Serie del Documento"

      - name: observaciones
        sql: "{CUBE}.observ"
        type: string
        title: "Observaciones"

      - name: vendedor
        sql: "{CUBE}.vend"
        type: string
        title: "Vendedor"

      - name: esViable
        sql: "{CUBE}.is_viable"
        type: boolean
        title: "Es Viable"
        description: "Indica si la venta es válida para análisis"

    measures:
      # --- Medidas de Ventas (SOLO VIABLES) ---
      - name: importeTotal
        sql: "CASE WHEN {CUBE}.is_viable = true THEN {CUBE}.importe ELSE 0 END"
        type: sum
        format: currency
        title: "Importe Total"
        description: "Suma total de importes de ventas VIABLES (excluye canceladas/corruptas)"

      - name: importeVentas
        sql: "CASE WHEN {CUBE}.is_viable = true AND {CUBE}.tipo_doc IN ('REM', 'FAC') THEN {CUBE}.importe ELSE 0 END"
        type: sum
        format: currency
        title: "Importe Ventas"
        description: "Solo ventas viables (REM y FAC), excluye devoluciones y canceladas"

      - name: importeDevoluciones
        sql: "CASE WHEN {CUBE}.is_viable = true AND {CUBE}.tipo_doc IN ('DEV', 'DV') THEN {CUBE}.importe ELSE 0 END"
        type: sum
        format: currency
        title: "Importe Devoluciones"
        description: "Solo devoluciones viables (DEV y DV)"

      - name: importeNeto
        sql: |
          CASE 
            WHEN {CUBE}.is_viable = true AND {CUBE}.tipo_doc IN ('REM', 'FAC') THEN {CUBE}.importe 
            WHEN {CUBE}.is_viable = true AND {CUBE}.tipo_doc IN ('DEV', 'DV') THEN -{CUBE}.importe 
            ELSE 0 
          END
        type: sum
        format: currency
        title: "Importe Neto"
        description: "Ventas menos devoluciones (solo viables)"

      - name: descuentoTotal
        sql: "CASE WHEN {CUBE}.is_viable = true THEN {CUBE}.descuento ELSE 0 END"
        type: sum
        format: currency
        title: "Descuentos"

      - name: impuestoTotal
        sql: "CASE WHEN {CUBE}.is_viable = true THEN {CUBE}.impuesto ELSE 0 END"
        type: sum
        format: currency
        title: "Impuestos"

      - name: precioTotal
        sql: "CASE WHEN {CUBE}.is_viable = true THEN {CUBE}.precio ELSE 0 END"
        type: sum
        format: currency
        title: "Precio Total"

      - name: costoTotal
        sql: "CASE WHEN {CUBE}.is_viable = true THEN {CUBE}.costo ELSE 0 END"
        type: sum
        format: currency
        title: "Costo Total"

      # --- Medidas de Conteo (SOLO VIABLES) ---
      - name: conteoDocumentos
        sql: "CASE WHEN {CUBE}.is_viable = true THEN 1 ELSE 0 END"
        type: sum
        title: "# Documentos"
        description: "Número total de documentos viables"

      - name: conteoVentas
        sql: "CASE WHEN {CUBE}.is_viable = true AND {CUBE}.tipo_doc IN ('REM', 'FAC') THEN 1 ELSE 0 END"
        type: sum
        title: "# Ventas"
        description: "Número de ventas viables (REM y FAC)"

      - name: conteoDevoluciones
        sql: "CASE WHEN {CUBE}.is_viable = true AND {CUBE}.tipo_doc IN ('DEV', 'DV') THEN 1 ELSE 0 END"
        type: sum
        title: "# Devoluciones"
        description: "Número de devoluciones viables (DEV y DV)"

      - name: porcentajeDevoluciones
        sql: |
          CAST(
            SUM(CASE WHEN {CUBE}.is_viable = true AND {CUBE}.tipo_doc IN ('DEV', 'DV') THEN {CUBE}.importe ELSE 0 END) AS DOUBLE
          ) / NULLIF(
            CAST(SUM(CASE WHEN {CUBE}.is_viable = true AND {CUBE}.tipo_doc IN ('REM', 'FAC') THEN {CUBE}.importe ELSE 0 END) AS DOUBLE), 
            0
          ) * 100
        type: number
        format: percent
        title: "% Devoluciones"
        description: "Porcentaje de devoluciones sobre ventas (solo viables)"

    segments:
      - name: soloVentas
        sql: "{CUBE}.tipo_doc IN ('REM', 'FAC')"
        title: "Solo Ventas (REM y FAC)"

      - name: soloDevoluciones
        sql: "{CUBE}.tipo_doc IN ('DEV', 'DV')"
        title: "Solo Devoluciones (DEV y DV)"

      - name: documentosViables
        sql: "{CUBE}.is_viable = true"
        title: "Solo Documentos Viables"

      - name: documentosCompletados
        sql: "{CUBE}.estado = 'CO'"
        title: "Solo Completados"
