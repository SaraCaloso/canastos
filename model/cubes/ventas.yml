cubes:
  - name: ventas
    title: "Ventas (Cabecero)"
    sql: |
      SELECT *
      FROM (
        SELECT
          *,
          ROW_NUMBER() OVER (
            PARTITION BY venta, sucursal
            ORDER BY
              CASE tipo_doc
                WHEN 'FAC' THEN 1
                WHEN 'TIC' THEN 2
                WHEN 'PE'  THEN 3
                WHEN 'REM' THEN 4
                ELSE 5
              END
          ) AS rn
        FROM canastos_tfx.tfx_table_ventas
      ) deduplicado
      WHERE rn = 1
    public: true
    description: |
      ⚠️ ADVERTENCIA: Este cubo contiene cabeceros de documentos.
      La deduplicación se aplica por folio+sucursal priorizando FAC > TIC > PE > REM.

    joins:
      - name: clientes
        relationship: many_to_one
        sql: "{CUBE}.cliente = {clientes.codigoCliente} AND {CUBE}.sucursal = {clientes.sucursal}"

    segments:
      - name: ventasValidas
        sql: "{CUBE}.is_viable = true"
        title: "Solo Ventas Viables"

      # Segmento para excluir duplicados de pedidos convertidos a factura.
      # Incluye TIC, NC, PE además de los documentos base.
      - name: sinDuplicacionPedidos
        sql: "{CUBE}.tipo_doc IN ('FAC', 'REM', 'TIC', 'NC', 'DV', 'PE', 'DEV')"
        title: "Sin Duplicar Pedidos"

      # Segmento para la parte de mayoreo
      - name: ventasReales
        sql: |
          {CUBE}.is_viable = true 
          AND ({CUBE}.observ IS NULL OR {CUBE}.observ NOT LIKE '%TICKETS ANEXOS%')
          AND NOT ({CUBE}.cliente IN ('sys', 'SYS') AND {CUBE}.tipo_doc = 'FAC')
          AND {CUBE}.estado <> 'PE'
        title: "Ventas Reales (Filtros Aplicados)"

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.sucursal || '-' || {CUBE}.tipo_doc"
        type: string
        primary_key: true
        title: "ID Venta Único"
        
      - name: is_viable
        sql: "{CUBE}.is_viable"
        type: boolean

      - name: numeroVenta
        sql: "{CUBE}.venta"
        type: string
        title: "Folio"

      - name: cliente
        sql: "{CUBE}.cliente"
        type: string
        title: "Código Cliente"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: tipoDocumento
        sql: "{CUBE}.tipo_doc"
        type: string
        title: "Tipo de Documento"

      - name: fechaTransaccion
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha Venta"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1  THEN 'Enero'      WHEN 2  THEN 'Febrero'    WHEN 3  THEN 'Marzo'
            WHEN 4  THEN 'Abril'      WHEN 5  THEN 'Mayo'       WHEN 6  THEN 'Junio'
            WHEN 7  THEN 'Julio'      WHEN 8  THEN 'Agosto'     WHEN 9  THEN 'Septiembre'
            WHEN 10 THEN 'Octubre'    WHEN 11 THEN 'Noviembre'  WHEN 12 THEN 'Diciembre'
          END
        type: string
        title: "Mes"

      # Nuevas dimensiones para mayoreo
      - name: observacion
        sql: "{CUBE}.observacion"
        type: string
        title: "Observación"
        
      - name: estado
        sql: "{CUBE}.estado"
        type: string
        title: "Estado de Venta"

    measures:
      - name: montoTotal
        sql: "{CUBE}.importe"
        type: sum
        format: currency
        title: "Monto Bruto Cabecero"
        # Suma sin filtro de tipo_doc — incluye todos los documentos.
        # Usar solo para diagnóstico, no para reportes de ventas.

      # FIX 2025-04 — alineado con reporte original "Ventas por artículo por impuesto"
      # El reporte original filtra: tipo_doc IN ('FAC', 'DV', 'DEV', 'REM')
      # Se excluyen TIC, PE, NC que estaban inflando el monto (~$237 diferencia en ARRIETA).
      # Referencia: CODIGO_Ventas_por_Articulo_por_impuesto.txt línea WHERE ventas.tipo_doc
      - name: montoSinDuplicar
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'DV', 'DEV') THEN {CUBE}.importe
            ELSE 0 
          END
        type: sum
        format: currency
        title: "Monto Sin Duplicar"

      # FIX 2025-04 — misma alineación que montoSinDuplicar
      # Solo FAC, REM, DV, DEV para consistencia con el reporte original.
      - name: impuestoSinDuplicar
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'DV', 'DEV') THEN {CUBE}.impuesto
            ELSE 0 
          END
        type: sum
        format: currency
        title: "Impuesto Total Sin Duplicar"

      - name: totalImpuesto
        sql: "{CUBE}.impuesto"
        type: sum
        format: currency
        title: "Impuesto Total (Bruto)"
        # Suma bruta sin filtro. Usar impuestoSinDuplicar para reportes.

      # Nueva medida para mayoreo
      - name: montoNetoReal
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('DV', 'NC', 'DEV') THEN -{CUBE}.importe 
            ELSE {CUBE}.importe 
          END
        type: sum
        format: currency
        title: "Venta Neta Real"
        filters:
          # CAMBIO: Se usa 'sql' en lugar de 'segment' y se corrige 'observ' a 'observacion'
          - sql: |
              {CUBE}.is_viable = true 
              AND ({CUBE}.observacion IS NULL OR {CUBE}.observacion NOT LIKE '%TICKETS ANEXOS%')
              AND NOT ({CUBE}.cliente IN ('sys', 'SYS') AND {CUBE}.tipo_doc = 'FAC')
              AND {CUBE}.estado <> 'PE'
