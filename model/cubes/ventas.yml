cubes:
  - name: ventas
    title: "Ventas (Cabecero)"
    sql_table: canastos_tfx.tfx_table_ventas
    public: true
    
    description: |
      ⚠️ ADVERTENCIA: Este cubo contiene cabeceros de documentos.
      Un mismo folio puede tener múltiples registros (PE→FAC, PE→REM).

    joins:
      - name: clientes
        relationship: many_to_one
        sql: "{CUBE}.cliente = {clientes.codigoCliente} AND {CUBE}.sucursal = {clientes.sucursal}"

    segments:
      - name: ventasValidas
        sql: "{CUBE}.is_viable = true"
        title: "Solo Ventas Viables"

      - name: sinDuplicacionPedidos
        sql: |
          {CUBE}.tipo_doc NOT IN ('PE')
          OR NOT EXISTS (
            SELECT 1 FROM canastos_tfx.tfx_table_ventas v2
            WHERE v2.venta = {CUBE}.venta 
              AND v2.sucursal = {CUBE}.sucursal
              AND v2.tipo_doc IN ('FAC', 'REM')
          )
        title: "🎯 Sin Duplicar Pedidos"

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.sucursal || '-' || {CUBE}.tipo_doc"
        type: string
        primary_key: true
        title: "ID Venta Único"

      - name: numeroVenta
        sql: "{CUBE}.venta"
        type: string
        title: "Folio"

      - name: cliente
        sql: "{CUBE}.cliente"
        type: string
        title: "Código Cliente"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: fechaTransaccion
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha Venta"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1 THEN 'January'
            WHEN 2 THEN 'February'
            WHEN 3 THEN 'March'
            WHEN 4 THEN 'April'
            WHEN 5 THEN 'May'
            WHEN 6 THEN 'June'
            WHEN 7 THEN 'July'
            WHEN 8 THEN 'August'
            WHEN 9 THEN 'September'
            WHEN 10 THEN 'October'
            WHEN 11 THEN 'November'
            WHEN 12 THEN 'December'
          END
        type: string
        title: "Mes"

    measures:
      - name: montoTotal
        sql: "{CUBE}.importe"
        type: sum
        format: currency
        title: "Monto Bruto Cabecero"

      - name: montoSinDuplicar
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'TIC', 'NC', 'DV') THEN {CUBE}.importe
            WHEN NOT EXISTS (
              SELECT 1 FROM canastos_tfx.tfx_table_ventas v2
              WHERE v2.venta = {CUBE}.venta 
                AND v2.sucursal = {CUBE}.sucursal
                AND v2.tipo_doc IN ('FAC', 'REM')
            ) THEN {CUBE}.importe
            ELSE 0
          END
        type: sum
        format: currency
        title: "✅ Monto Sin Duplicar"

      - name: impuestoSinDuplicar
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'TIC', 'NC', 'DV') THEN {CUBE}.impuesto
            WHEN NOT EXISTS (
              SELECT 1 FROM canastos_tfx.tfx_table_ventas v2
              WHERE v2.venta = {CUBE}.venta 
                AND v2.sucursal = {CUBE}.sucursal
                AND v2.tipo_doc IN ('FAC', 'REM')
            ) THEN {CUBE}.impuesto
            ELSE 0
          END
        type: sum
        format: currency
        title: "✅ Impuesto Total Sin Duplicar"

      - name: totalImpuesto
        sql: "{CUBE}.impuesto"
        type: sum
        format: currency
        title: "Impuesto Total (Bruto)"
