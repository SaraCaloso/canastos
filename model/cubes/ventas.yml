cubes:
  - name: ventas
    title: "Ventas (Cabecero)"
    sql_table: canastos_tfx.tfx_table_ventas
    public: true

    description: |
      Cabeceros de venta desde tfx_table_ventas.
      Los importes aquí son CON impuesto incluido (tal como reporta el ERP/Excel).
      Folios en rango 191xxx (folio ERP).
      
      ⚠️ Un folio puede tener PE + FAC/REM — usar montoSinDuplicar.

    joins:
      - name: clientes
        relationship: many_to_one
        sql: "{CUBE}.cliente = {clientes.codigoCliente} AND {CUBE}.sucursal = {clientes.sucursal}"

    segments:
      - name: ventasValidas
        sql: "{CUBE}.is_viable = true"
        title: "Solo Ventas Viables"

      - name: sinDuplicacionPedidos
        sql: |
          {CUBE}.tipo_doc NOT IN ('PE')
          OR NOT EXISTS (
            SELECT 1 FROM canastos_tfx.tfx_table_ventas v2
            WHERE v2.venta = {CUBE}.venta
              AND v2.sucursal = {CUBE}.sucursal
              AND v2.tipo_doc IN ('FAC', 'REM')
          )
        title: "Sin Duplicar Pedidos"

      - name: soloTickets
        sql: "{CUBE}.tipo_doc = 'TIC'"
        title: "Solo Tickets"

      - name: soloFacturas
        sql: "{CUBE}.tipo_doc = 'FAC'"
        title: "Solo Facturas"

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.sucursal || '-' || {CUBE}.tipo_doc"
        type: string
        primary_key: true
        title: "ID Venta Único"

      - name: numeroVenta
        sql: "{CUBE}.venta"
        type: string
        title: "Folio ERP"

      - name: cliente
        sql: "{CUBE}.cliente"
        type: string
        title: "Código Cliente"

      - name: tipoDocumento
        sql: "{CUBE}.tipo_doc"
        type: string
        title: "Tipo Documento"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: fechaTransaccion
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha Venta"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1 THEN 'January'   WHEN 2 THEN 'February'  WHEN 3 THEN 'March'
            WHEN 4 THEN 'April'     WHEN 5 THEN 'May'        WHEN 6 THEN 'June'
            WHEN 7 THEN 'July'      WHEN 8 THEN 'August'     WHEN 9 THEN 'September'
            WHEN 10 THEN 'October'  WHEN 11 THEN 'November'  WHEN 12 THEN 'December'
          END
        type: string
        title: "Mes"

      - name: diaSemana
        sql: |
          CASE EXTRACT(DOW FROM {CUBE}.partition_date)
            WHEN 0 THEN 'Sunday'   WHEN 1 THEN 'Monday'    WHEN 2 THEN 'Tuesday'
            WHEN 3 THEN 'Wednesday' WHEN 4 THEN 'Thursday' WHEN 5 THEN 'Friday'
            WHEN 6 THEN 'Saturday'
          END
        type: string
        title: "Día Semana"

    measures:
      - name: conteoFolios
        sql: "{CUBE}.venta || '-' || {CUBE}.sucursal"
        type: count_distinct
        title: "# Tickets"

      # ✅ ESTA es la medida que cuadra con el Excel
      # importe en tfx_table_ventas ya incluye impuestos
      - name: montoSinDuplicar
        sql: |
          CASE
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'TIC', 'NC', 'DV') THEN {CUBE}.importe
            WHEN NOT EXISTS (
              SELECT 1 FROM canastos_tfx.tfx_table_ventas v2
              WHERE v2.venta = {CUBE}.venta
                AND v2.sucursal = {CUBE}.sucursal
                AND v2.tipo_doc IN ('FAC', 'REM')
            ) THEN {CUBE}.importe
            ELSE 0
          END
        type: sum
        format: currency
        title: "✅ Venta Total (cuadra con Excel)"
        description: |
          Suma el importe del cabecero sin duplicar pedidos.
          El importe en ventas YA incluye impuestos.
          Este número debe coincidir con la columna 'Total' del reporte Excel.

      - name: impuestoTotal
        sql: "{CUBE}.impuesto"
        type: sum
        format: currency
        title: "Impuesto (Cabecero)"
