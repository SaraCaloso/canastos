cubes:
  - name: ventas
    title: "Ventas (Cabecero)"
    sql_table: canastos_tfx.tfx_table_ventas
    public: true
    
    description: |
      Este cubo contiene los cabeceros de documentos originales.
      La deduplicación se gestiona mediante medidas específicas.

    joins:
      - name: clientes
        relationship: many_to_one
        sql: "{CUBE}.cliente = {clientes.codigoCliente} AND {CUBE}.sucursal = {clientes.sucursal}"

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.sucursal || '-' || {CUBE}.tipo_doc"
        type: string
        primary_key: true

      - name: numeroVenta
        sql: "{CUBE}.venta"
        type: string
        title: "Folio"

      - name: cliente
        sql: "{CUBE}.cliente"
        type: string
        title: "Código Cliente"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: tipoDocumento
        sql: "{CUBE}.tipo_doc"
        type: string
        title: "Tipo de Documento"

      - name: fechaTransaccion
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha Venta"

    measures:
      - name: montoSinDuplicar
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'TIC', 'NC', 'DV', 'PE') THEN {CUBE}.importe
            ELSE 0 
          END
        type: sum
        format: currency
        title: "✅ Monto Sin Duplicar"

      - name: impuestoSinDuplicar
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'TIC', 'NC', 'DV', 'PE') THEN {CUBE}.impuesto
            ELSE 0 
          END
        type: sum
        format: currency
        title: "✅ Impuesto Total Sin Duplicar"
