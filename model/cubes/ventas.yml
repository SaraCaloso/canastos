cubes:
  - name: ventas
    title: "Ventas (Cabecero)"
    # CORRECCIÓN: se reemplaza sql_table por sql con ROW_NUMBER() para deduplicar
    # por folio+sucursal, priorizando FAC > TIC > PE > REM
    sql: |
      SELECT *
      FROM (
        SELECT
          *,
          ROW_NUMBER() OVER (
            PARTITION BY venta, sucursal
            ORDER BY
              CASE tipo_doc
                WHEN 'FAC' THEN 1
                WHEN 'TIC' THEN 2
                WHEN 'PE'  THEN 3
                WHEN 'REM' THEN 4
                ELSE 5
              END
          ) AS rn
        FROM canastos_tfx.tfx_table_ventas
      ) deduplicado
      WHERE rn = 1
    public: true

    description: |
      ⚠️ ADVERTENCIA: Este cubo contiene cabeceros de documentos.
      La deduplicación se aplica por folio+sucursal priorizando FAC > TIC > PE > REM.

    joins:
      - name: clientes
        relationship: many_to_one
        sql: "{CUBE}.cliente = {clientes.codigoCliente} AND {CUBE}.sucursal = {clientes.sucursal}"

    segments:
      - name: ventasValidas
        sql: "{CUBE}.is_viable = true"
        title: "Solo Ventas Viables"

      - name: sinDuplicacionPedidos
        sql: "{CUBE}.tipo_doc IN ('FAC', 'REM', 'TIC', 'NC', 'DV', 'PE')"
        title: "🎯 Sin Duplicar Pedidos"

    dimensions:
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.sucursal || '-' || {CUBE}.tipo_doc"
        type: string
        primary_key: true
        title: "ID Venta Único"

      - name: numeroVenta
        sql: "{CUBE}.venta"
        type: string
        title: "Folio"

      - name: cliente
        sql: "{CUBE}.cliente"
        type: string
        title: "Código Cliente"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: tipoDocumento
        sql: "{CUBE}.tipo_doc"
        type: string
        title: "Tipo de Documento"

      - name: fechaTransaccion
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha Venta"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1  THEN 'January'
            WHEN 2  THEN 'February'
            WHEN 3  THEN 'March'
            WHEN 4  THEN 'April'
            WHEN 5  THEN 'May'
            WHEN 6  THEN 'June'
            WHEN 7  THEN 'July'
            WHEN 8  THEN 'August'
            WHEN 9  THEN 'September'
            WHEN 10 THEN 'October'
            WHEN 11 THEN 'November'
            WHEN 12 THEN 'December'
          END
        type: string
        title: "Mes"

    measures:
      - name: montoTotal
        sql: "{CUBE}.importe"
        type: sum
        format: currency
        title: "Monto Bruto Cabecero"

      - name: montoSinDuplicar
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'TIC', 'NC', 'DV', 'PE') THEN {CUBE}.importe
            ELSE 0 
          END
        type: sum
        format: currency
        title: "✅ Monto Sin Duplicar"

      - name: impuestoSinDuplicar
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'TIC', 'NC', 'DV', 'PE') THEN {CUBE}.impuesto
            ELSE 0 
          END
        type: sum
        format: currency
        title: "✅ Impuesto Total Sin Duplicar"

      - name: totalImpuesto
        sql: "{CUBE}.impuesto"
        type: sum
        format: currency
        title: "Impuesto Total (Bruto)"
