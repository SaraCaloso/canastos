# =============================================================================
# CUBO: ventas
# =============================================================================
# Este cubo representa el CABECERO de cada transacción de venta.
# Un cabecero contiene información general del documento (folio, cliente,
# tipo, monto total, estado), a diferencia de las partidas que contienen
# el detalle artículo por artículo.
#
# Fuente de datos: canastos_tfx.tfx_table_ventas
#
# ⚠️ ADVERTENCIA IMPORTANTE — DEDUPLICACIÓN:
#   La tabla original puede contener el mismo folio+sucursal con varios
#   tipos de documento (ej: un pedido que luego se convirtió en factura
#   aparece tanto como 'PE' y como 'FAC').
#   Para evitar conteos duplicados, este cubo aplica una ventana ROW_NUMBER()
#   que se queda con UNA sola fila por folio+sucursal, priorizando:
#     FAC > TIC > PE > REM > (otros)
#   Solo la fila con rn = 1 es visible en el cubo.
#
# Relación con otros cubos:
#   → Es el padre de "partidasVenta" (un cabecero tiene muchas partidas).
#   → Se une con "clientes" por código de cliente + sucursal.
# =============================================================================

cubes:
  - name: ventas
    title: "Ventas (Cabecero)"
    sql: |
      SELECT *
      FROM (
        SELECT
          *,
          -- Asignamos un número de fila por folio+sucursal.
          -- El documento con menor número (rn=1) es el que "gana" y se queda.
          -- Prioridad: FAC (factura) > TIC (ticket) > PE (pedido) > REM (remisión)
          ROW_NUMBER() OVER (
            PARTITION BY venta, sucursal
            ORDER BY
              CASE tipo_doc
                WHEN 'FAC' THEN 1
                WHEN 'TIC' THEN 2
                WHEN 'PE'  THEN 3
                WHEN 'REM' THEN 4
                ELSE 5
              END
          ) AS rn
        FROM canastos_tfx.tfx_table_ventas
      ) deduplicado
      WHERE rn = 1   -- Solo nos quedamos con el documento de mayor prioridad
    public: true
    description: |
      ⚠️ ADVERTENCIA: Este cubo contiene cabeceros de documentos.
      La deduplicación se aplica por folio+sucursal priorizando FAC > TIC > PE > REM.

    # -------------------------------------------------------------------------
    # JOINS
    # -------------------------------------------------------------------------
    joins:
      # Relaciona cada venta con el perfil del cliente que la realizó.
      # Es una relación muchos-a-uno: varios tickets pueden ser del mismo cliente.
      - name: clientes
        relationship: many_to_one
        sql: "{CUBE}.cliente = {clientes.codigoCliente} AND {CUBE}.sucursal = {clientes.sucursal}"

    # -------------------------------------------------------------------------
    # SEGMENTOS
    # Los segmentos son filtros predefinidos reutilizables.
    # Se pueden aplicar en cualquier consulta sin repetir el WHERE.
    # -------------------------------------------------------------------------
    segments:
      # Filtra solo las ventas marcadas como válidas en el sistema.
      # Excluye documentos cancelados, erróneos o de prueba.
      - name: ventasValidas
        sql: "{CUBE}.is_viable = true"
        title: "Solo Ventas Viables"

      # Incluye los tipos de documento que representan ventas reales finales.
      # Excluye documentos intermedios que podrían duplicar montos si se suman
      # junto con sus conversiones (ej: un PE que luego fue FAC).
      - name: sinDuplicacionPedidos
        sql: "{CUBE}.tipo_doc IN ('FAC', 'REM', 'TIC', 'NC', 'DV', 'PE', 'DEV')"
        title: "Sin Duplicar Pedidos"

      # Segmento más estricto para análisis de ventas reales al mayoreo.
      # Aplica 3 filtros adicionales sobre is_viable:
      #   1. Excluye documentos con "TICKETS ANEXOS" en la observación
      #      (son agrupaciones contables, no ventas independientes).
      #   2. Excluye facturas del cliente interno 'sys'/'SYS'
      #      (son movimientos internos del sistema, no ventas reales).
      #   3. Excluye documentos en estado 'PE' (pedido pendiente, no confirmado).
      - name: ventasReales
        sql: |
          {CUBE}.is_viable = true 
          AND ({CUBE}.observ IS NULL OR {CUBE}.observ NOT LIKE '%TICKETS ANEXOS%')
          AND NOT ({CUBE}.cliente IN ('sys', 'SYS') AND {CUBE}.tipo_doc = 'FAC')
          AND {CUBE}.estado <> 'PE'
        title: "Ventas Reales (Filtros Aplicados)"

    # -------------------------------------------------------------------------
    # DIMENSIONES
    # -------------------------------------------------------------------------
    dimensions:
      # Llave primaria del cabecero. Combina folio + sucursal + tipo de documento
      # para garantizar unicidad incluso con la deduplicación activa.
      - name: id
        sql: "{CUBE}.venta || '-' || {CUBE}.sucursal || '-' || {CUBE}.tipo_doc"
        type: string
        primary_key: true
        title: "ID Venta Único"

      # Número de folio del documento (ticket, factura, remisión, etc.).
      - name: numeroVenta
        sql: "{CUBE}.venta"
        type: string
        title: "Folio"

      # Código del cliente que realizó la compra.
      # En ventas de mostrador sin cliente registrado, este campo puede
      # contener 'sys', 'SYS' u otro valor genérico del sistema.
      - name: cliente
        sql: "{CUBE}.cliente"
        type: string
        title: "Código Cliente"

      # Clave de la sucursal donde se generó el documento.
      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      # Tipo de documento de la transacción. Valores comunes:
      #   FAC = Factura, TIC = Ticket, PE = Pedido, REM = Remisión,
      #   DV = Devolución, NC = Nota de crédito, DEV = Devolución
      - name: tipoDocumento
        sql: "{CUBE}.tipo_doc"
        type: string
        title: "Tipo de Documento"

      # Fecha en que se registró la transacción.
      - name: fechaTransaccion
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha Venta"

      # Año de la transacción.
      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      # Número de mes (1–12).
      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      # Nombre del mes en español para etiquetas en reportes.
      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1  THEN 'Enero'      WHEN 2  THEN 'Febrero'    WHEN 3  THEN 'Marzo'
            WHEN 4  THEN 'Abril'      WHEN 5  THEN 'Mayo'       WHEN 6  THEN 'Junio'
            WHEN 7  THEN 'Julio'      WHEN 8  THEN 'Agosto'     WHEN 9  THEN 'Septiembre'
            WHEN 10 THEN 'Octubre'    WHEN 11 THEN 'Noviembre'  WHEN 12 THEN 'Diciembre'
          END
        type: string
        title: "Mes"

      # Texto libre de observaciones capturado en la venta.
      # Se usa para detectar agrupaciones especiales como "TICKETS ANEXOS".
      - name: observacion
        sql: "{CUBE}.observacion"
        type: string
        title: "Observación"

      # Estado actual del documento.
      # Ejemplo: 'PE' = pendiente (aún no confirmado como venta definitiva).
      - name: estado
        sql: "{CUBE}.estado"
        type: string
        title: "Estado de Venta"

    # -------------------------------------------------------------------------
    # MEDIDAS
    # -------------------------------------------------------------------------
    measures:
      # Suma bruta del campo importe sin ningún filtro adicional.
      # ⚠️ ADVERTENCIA: Incluye TODOS los tipos de documento, por lo que puede
      # duplicar montos si un pedido fue convertido a factura.
      # Usar solo para diagnóstico o comparación, NO para reportes de ventas.
      - name: montoTotal
        sql: "{CUBE}.importe"
        type: sum
        format: currency
        title: "Monto Bruto Cabecero"

      # Suma del importe filtrada a documentos finales (FAC, REM, DV, DEV).
      # Excluye TIC, PE y NC que estarían duplicando el monto cuando un pedido
      # o ticket se convirtió en factura o remisión.
      # FIX 2025-04: Alineado con el reporte "Ventas por artículo por impuesto"
      # del sistema contable original, que filtra por esos mismos tipos.
      - name: montoSinDuplicar
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'DV', 'DEV') THEN {CUBE}.importe
            ELSE 0 
          END
        type: sum
        format: currency
        title: "Monto Sin Duplicar"

      # Impuesto total registrado en el cabecero, filtrado igual que montoSinDuplicar.
      # Solo considera FAC, REM, DV, DEV para evitar duplicación.
      # FIX 2025-04: Misma alineación que montoSinDuplicar.
      - name: impuestoSinDuplicar
        sql: |
          CASE 
            WHEN {CUBE}.tipo_doc IN ('FAC', 'REM', 'DV', 'DEV') THEN {CUBE}.impuesto
            ELSE 0 
          END
        type: sum
        format: currency
        title: "Impuesto Total Sin Duplicar"

      # Suma bruta del impuesto sin ningún filtro.
      # Misma advertencia que montoTotal: puede duplicar si hay pedidos convertidos.
      # Preferir impuestoSinDuplicar para reportes.
      - name: totalImpuesto
        sql: "{CUBE}.impuesto"
        type: sum
        format: currency
        title: "Impuesto Total (Bruto)"
      # Clientes registrados: cuenta códigos de cliente únicos,
      # excluyendo el cliente genérico del sistema ('sys'/'SYS')
      # que se asigna a ventas de mostrador sin cliente registrado.
      - name: clientesUnicos
        sql: |
          CASE 
            WHEN {CUBE}.cliente NOT IN ('sys', 'SYS') 
            THEN {CUBE}.cliente
            ELSE NULL 
          END
        type: count_distinct
        title: "Clientes Únicos (Registrados)"
        filters: [{ sql: "{CUBE}.is_viable = true" }]
