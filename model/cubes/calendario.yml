# =============================================================================
# CUBO: calendario
# =============================================================================
# Este cubo representa una TABLA DE CALENDARIO auxiliar precalculada.
# Su propósito es servir como dimensión de tiempo confiable para joins y
# filtros de fecha en otros cubos, evitando recalcular EXTRACT y CASE en
# cada cubo por separado.
#
# Fuente de datos: canastos_tfx.calendar_table
#
# VENTAJAS SOBRE CALCULAR FECHAS EN CADA CUBO:
#   - Consistencia garantizada: todos los cubos usan la misma definición
#     de año, mes, día de semana y nombre de mes.
#   - Mejor rendimiento: los valores ya están precalculados en la tabla;
#     no se ejecutan funciones EXTRACT o CASE en tiempo de consulta.
#   - Facilita filtros de rango en el playground sin depender de partition_date.
#
# Relación con otros cubos:
#   → Puede unirse a cualquier cubo que tenga una dimensión de tipo 'time'
#     para enriquecer consultas con atributos de fecha (festivos, semana, etc.).
#   → No tiene joins declarados aquí; los joins se declaran en el cubo hijo.
# =============================================================================

cubes:
  - name: calendario
    title: "Calendario"
    sql_table: canastos_tfx.calendar_table
    public: true # Disponible como dimensión de lookup en el playground

    joins: [] # Sin relaciones declaradas aquí; los cubos hijos hacen el join

    # -------------------------------------------------------------------------
    # DIMENSIONES
    # -------------------------------------------------------------------------
    dimensions:
      # Llave primaria: fecha del día.
      # Es de tipo 'time' para habilitar filtros de rango nativos en Cube.
      - name: fecha
        sql: "{CUBE}.cal_date"
        type: time
        primary_key: true
        title: "Fecha"

      # Año del calendario. Precalculado en la tabla origen.
      - name: anio
        sql: "{CUBE}.year"
        type: number
        title: "Año"

      # Número de mes (1–12). Precalculado en la tabla origen.
      # Útil para ordenar cronológicamente en gráficas.
      - name: numMes
        sql: "{CUBE}.month"
        type: number
        title: "Mes (Num)"

      # Nombre del mes en el idioma configurado en la tabla origen.
      # Precalculado; no requiere CASE en tiempo de consulta.
      - name: nombreMes
        sql: "{CUBE}.month_name"
        type: string
        title: "Mes"

      # Nombre del día de la semana precalculado.
      # Convención de la tabla: revisar si 0 = Domingo o 0 = Lunes
      # para garantizar consistencia con los otros cubos (DOW PostgreSQL/Trino).
      - name: diaSemana
        sql: "{CUBE}.day_of_week_name"
        type: string
        title: "Día Semana"
