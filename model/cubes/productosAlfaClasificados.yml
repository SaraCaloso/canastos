# =============================================================================
# CUBO: productosAlfaClasificados
# =============================================================================
# Este cubo clasifica los PRODUCTOS CON SKU ALFANUMÉRICO que no pueden
# unirse directamente al catálogo numérico (catalogoProductos).
#
# Fuente de datos: canastos_tfx.tfx_table_partvta
#
# CONTEXTO DEL PROBLEMA:
#   El inventario y las partidas de venta mezclan dos tipos de SKU:
#     - Numéricos  → cubiertos por "catalogoProductos" via CAST a BIGINT.
#     - Alfanuméricos → este cubo; no pueden convertirse a BIGINT.
#   Sin esta clasificación, ~106 productos alfanuméricos aparecerían
#   sin marca ni línea en los reportes.
#
# ESTRATEGIA DE CLASIFICACIÓN HÍBRIDA (2 capas):
#   1. MAPEO DIRECTO (23 productos):
#      Productos con equivalente numérico conocido en el inventario.
#      Se asigna marca y línea real manualmente (valores hardcodeados).
#   2. PARSING AUTOMÁTICO (83 productos restantes):
#      Se extrae marca y línea del campo 'observ' (descripción del producto)
#      usando LIKE sobre palabras clave en UPPER(observ).
#      El fallback es 'PRODUCTOS LOCALES' / 'SIN CLASIFICAR'.
#
# FILTROS APLICADOS EN LA FUENTE:
#   - TRY_CAST(articulo AS BIGINT) IS NULL → solo alfanuméricos
#   - articulo NOT LIKE 'SYS%' → excluye artículos internos del sistema
#   - articulo NOT IN ('SYS', 'CE AGUA.500 ML') → exclusiones puntuales
#   - observ IS NOT NULL AND observ != '' → requiere descripción para el parsing
#
# Relación con otros cubos:
#   → Complementa a "catalogoProductos" cubriendo el universo alfanumérico.
#   → No tiene joins declarados; se usa como lookup de clasificación.
# =============================================================================

cubes:
  - name: productosAlfaClasificados
    title: "Clasificación Híbrida de Productos Alfanuméricos"
    description: "Combina mapeo directo (23 productos con equivalente numérico) + parsing automático (83 productos restantes)"
    public: false # Solo para uso interno; exponer a través de vistas o joins

    # SELECT DISTINCT garantiza un registro por SKU alfanumérico único.
    # Las columnas 'marca' y 'linea' se calculan con la lógica híbrida descrita arriba.
    sql: |
      SELECT DISTINCT
        articulo AS sku_alfa,
        observ   AS descripcion,

        -- ====================================================================
        -- LÓGICA HÍBRIDA DE MARCA
        -- Capa 1: mapeo directo para 23 productos con match en inventario.
        -- Capa 2: parsing automático del campo observ para los restantes.
        -- ====================================================================
        CASE
          -- ── Capa 1: mapeo directo ─────────────────────────────────────────
          -- Productos cuya marca real se conoce porque tienen equivalente
          -- numérico en el inventario. Se asigna manualmente.
          WHEN articulo = 'C6'           THEN 'A'
          WHEN articulo = 'FCU'          THEN 'A'
          WHEN articulo = 'L080042'      THEN 'A'
          WHEN articulo = 'pp'           THEN 'A'
          WHEN articulo = 'ALE'          THEN 'A'
          WHEN articulo = 'COCOA HERSHEY' THEN 'A'
          WHEN articulo = 'Flete'        THEN 'SYS'   -- Servicio de flete; no es producto
          WHEN articulo = 'FLETE'        THEN 'SYS'   -- Variante mayúscula del mismo concepto
          WHEN articulo = 'SRM'          THEN 'A'
          WHEN articulo = 'SHELA'        THEN 'A'
          WHEN articulo = 'GFI'          THEN 'A'
          WHEN articulo = 'GMG'          THEN 'A'
          WHEN articulo = 'T0028'        THEN 'L'
          WHEN articulo = 'L0085'        THEN 'A'
          WHEN articulo = 'L0086'        THEN 'A'
          WHEN articulo = 'TURI'         THEN 'A'
          WHEN articulo = 'GAS'          THEN 'A'
          WHEN articulo = 'tfk'          THEN 'A'
          WHEN articulo = 'G00067'       THEN 'L'
          WHEN articulo = 'PUL'          THEN 'A'
          WHEN articulo = 'ARO'          THEN 'N'
          WHEN articulo = 'GUI'          THEN 'A'

          -- ── Capa 2: parsing automático por palabras clave en descripción ──
          -- Se hace UPPER(observ) para evitar fallos por capitalización mixta.
          WHEN UPPER(observ) LIKE '%NERIS%'           THEN 'NERIS'
          WHEN UPPER(observ) LIKE '%GARSI%'           THEN 'GARSI'
          WHEN UPPER(observ) LIKE '%HEALTHY SNACKS%'  THEN 'HEALTHY SNACKS'
          WHEN UPPER(observ) LIKE '%SAN LUIS%'        THEN 'SAN LUIS'
          WHEN UPPER(observ) LIKE '%KAI%'             THEN 'KAI'
          WHEN UPPER(observ) LIKE '%AMENAS%'          THEN 'AMENAS'
          WHEN UPPER(observ) LIKE '%TURIN%'           THEN 'TURIN'
          WHEN UPPER(observ) LIKE '%MI CASITA%'       THEN 'MI CASITA'
          WHEN UPPER(observ) LIKE '%HADITA%'          THEN 'HADITA'
          WHEN UPPER(observ) LIKE '%LOURDES%'         THEN 'LOURDES'
          WHEN UPPER(observ) LIKE '%LEVITE%'          THEN 'LEVITE'
          WHEN UPPER(observ) LIKE '%ANEVA%'           THEN 'ANEVA'
          WHEN UPPER(observ) LIKE '%KRISOS%'          THEN 'KRISOS'
          WHEN UPPER(observ) LIKE '%MIGUELITO%'       THEN 'MIGUELITO'
          WHEN UPPER(observ) LIKE '%LA VILLA%'        THEN 'LA VILLA'
          WHEN UPPER(observ) LIKE '%A GRANEL%'        THEN 'GRANEL'
          WHEN UPPER(observ) LIKE '%LOCAL%'           THEN 'PRODUCTOS LOCALES'

          -- Productos no comestibles (empaques y servicios)
          WHEN UPPER(observ) LIKE '%BOLSA%'       AND UPPER(observ) LIKE '%CAMISETA%' THEN 'ENVASES Y EMPAQUES'
          WHEN UPPER(observ) LIKE '%BOLSA BIODEGRADABLE%'                              THEN 'ENVASES Y EMPAQUES'
          WHEN UPPER(observ) LIKE '%FRASCO%'      OR  UPPER(observ) LIKE '%TARRO%'    THEN 'ENVASES Y EMPAQUES'
          WHEN UPPER(observ) LIKE '%COSTO ENVIO%' OR  UPPER(observ) LIKE '%FLETE%'   THEN 'SERVICIOS'

          -- Fallback: producto local sin coincidencia en ninguna regla anterior
          ELSE 'PRODUCTOS LOCALES'
        END AS marca,

        -- ====================================================================
        -- LÓGICA HÍBRIDA DE LÍNEA
        -- Misma estrategia de dos capas que para marca.
        -- La línea sigue la nomenclatura Lxx del catálogo numérico.
        -- ====================================================================
        CASE
          -- ── Capa 1: mapeo directo ─────────────────────────────────────────
          WHEN articulo = 'C6'            THEN 'L03'
          WHEN articulo = 'FCU'           THEN 'L23'
          WHEN articulo = 'L080042'       THEN 'L08'
          WHEN articulo = 'pp'            THEN 'L06'
          WHEN articulo = 'ALE'           THEN 'L06'
          WHEN articulo = 'COCOA HERSHEY' THEN 'L13'
          WHEN articulo = 'Flete'         THEN 'L19'
          WHEN articulo = 'FLETE'         THEN 'L19'
          WHEN articulo = 'SRM'           THEN 'L09'
          WHEN articulo = 'SHELA'         THEN 'L06'
          WHEN articulo = 'GFI'           THEN 'L06'
          WHEN articulo = 'GMG'           THEN 'L18'
          WHEN articulo = 'T0028'         THEN 'L29'
          WHEN articulo = 'L0085'         THEN 'L06'
          WHEN articulo = 'L0086'         THEN 'L06'
          WHEN articulo = 'TURI'          THEN 'L06'
          WHEN articulo = 'GAS'           THEN 'L06'
          WHEN articulo = 'tfk'           THEN 'L12'
          WHEN articulo = 'G00067'        THEN 'L02'
          WHEN articulo = 'PUL'           THEN 'L06'
          WHEN articulo = 'ARO'           THEN 'L06'
          WHEN articulo = 'GUI'           THEN 'L06'

          -- ── Capa 2: parsing automático por tipo de producto ───────────────
          WHEN UPPER(observ) LIKE '%GALLETA%'  OR UPPER(observ) LIKE '%ALFAJOR%' THEN 'GALLETAS'
          WHEN UPPER(observ) LIKE '%CHOCOLATE%'                                   THEN 'CHOCOLATES'

          -- Botanas: múltiples keywords; se excluyen vegetales para evitar falsos positivos
          WHEN UPPER(observ) LIKE '%PRETZEL%'    OR UPPER(observ) LIKE '%CHURRO%'
            OR UPPER(observ) LIKE '%CHICHARRON%' OR UPPER(observ) LIKE '%MAIZ INFLADO%'
            OR UPPER(observ) LIKE '%KONCHITA%'   OR UPPER(observ) LIKE '%FRITURA%'
            OR (UPPER(observ) LIKE '%CHIPS%'
              AND NOT UPPER(observ) LIKE '%CAMOTE%'
              AND NOT UPPER(observ) LIKE '%JICAMA%')  THEN 'BOTANAS'

          -- Vegetales procesados: chips de vegetales que se excluyen de BOTANAS arriba
          WHEN UPPER(observ) LIKE '%JICAMA%'   OR UPPER(observ) LIKE '%CAMOTE%'
            OR UPPER(observ) LIKE '%BETABEL%'  OR UPPER(observ) LIKE '%ZANAHORIA%'
            OR (UPPER(observ) LIKE '%PLATANO%' AND UPPER(observ) LIKE '%SAN LUIS%') THEN 'VEGETALES PROCESADOS'

          -- Dulces: amplia categoría de confitería
          WHEN UPPER(observ) LIKE '%GOMA%'       OR UPPER(observ) LIKE '%GOMITA%'
            OR UPPER(observ) LIKE '%PALETA%'     OR UPPER(observ) LIKE '%PALANQUETA%'
            OR UPPER(observ) LIKE '%DULCE%'      OR UPPER(observ) LIKE '%COCADA%'
            OR UPPER(observ) LIKE '%GLORIAS%'    OR UPPER(observ) LIKE '%MAZAPAN%'
            OR UPPER(observ) LIKE '%CHAMOY%'     OR UPPER(observ) LIKE '%CHIRIPADAS%'
            OR UPPER(observ) LIKE '%CHICLE%'     OR UPPER(observ) LIKE '%ATE%' THEN 'DULCES'

          WHEN UPPER(observ) LIKE '%ALEGRIA%'   THEN 'AMARANTO'
          WHEN UPPER(observ) LIKE '%GRANOLA%'   THEN 'CEREALES'

          -- Semillas: se excluye CHICHARRON para no chocar con BOTANAS
          WHEN UPPER(observ) LIKE '%CACAHUATE%'  OR UPPER(observ) LIKE '%NUEZ%'
            OR UPPER(observ) LIKE '%PEPITA%'     OR UPPER(observ) LIKE '%PISTACHE%'
            OR (UPPER(observ) LIKE '%SOYA%'
              AND NOT UPPER(observ) LIKE '%CHICHARRON%') THEN 'SEMILLAS Y FRUTOS SECOS'

          WHEN UPPER(observ) LIKE '%CONCENTRADO%' OR UPPER(observ) LIKE '%PONCHE%'
            OR UPPER(observ) LIKE '%TISANA%'     OR UPPER(observ) LIKE '%TE %'
            OR UPPER(observ) LIKE '%AGUA%'       OR UPPER(observ) LIKE '%COCA%' THEN 'BEBIDAS'

          WHEN UPPER(observ) LIKE '%MIEL%'      THEN 'MIELES Y ENDULZANTES'

          -- Se excluye CHICLE para no chocar con la regla de DULCES
          WHEN UPPER(observ) LIKE '%CHILE%'
            AND NOT UPPER(observ) LIKE '%CHICLE%' THEN 'CONDIMENTOS'

          WHEN UPPER(observ) LIKE '%MICRODOSIS%' THEN 'SUPLEMENTOS'
          WHEN UPPER(observ) LIKE '%CAFE%'        THEN 'CAFES Y TES'

          -- Caso especial: bolsita de MI CASITA es bebida, no envase
          WHEN UPPER(observ) LIKE '%BOLSITA%'
            AND UPPER(observv) LIKE '%MI CASITA%' THEN 'BEBIDAS'

          -- Productos no comestibles
          WHEN UPPER(observ) LIKE '%BOLSA%'  OR UPPER(observ) LIKE '%FRASCO%'
            OR UPPER(observ) LIKE '%TARRO%'                   THEN 'ENVASES Y EMPAQUES'
          WHEN UPPER(observ) LIKE '%COSTO ENVIO%'
            OR UPPER(observ) LIKE '%FLETE%'                   THEN 'SERVICIOS'

          -- Fallback: producto sin coincidencia en ninguna regla de línea
          ELSE 'SIN CLASIFICAR'
        END AS linea

      FROM canastos_tfx.tfx_table_partvta
      WHERE TRY_CAST(articulo AS BIGINT) IS NULL   -- Solo SKUs alfanuméricos
        AND articulo NOT LIKE 'SYS%'               -- Excluir artículos internos del sistema
        AND articulo NOT IN ('SYS', 'CE AGUA.500 ML')  -- Exclusiones puntuales conocidas
        AND observ IS NOT NULL                     -- Requiere descripción para el parsing
        AND observ != ''

    # -------------------------------------------------------------------------
    # DIMENSIONES
    # -------------------------------------------------------------------------
    dimensions:
      # Llave primaria: SKU alfanumérico único del producto.
      - name: sku
        sql: "{CUBE}.sku_alfa"
        type: string
        primary_key: true
        public: true
        title: "SKU Alfanumérico"

      # Descripción del producto extraída del campo observ de partvta.
      - name: descripcion
        sql: "{CUBE}.descripcion"
        type: string
        public: true
        title: "Descripción"

      # Marca asignada por la lógica híbrida (mapeo directo o parsing automático).
      - name: marca
        sql: "{CUBE}.marca"
        type: string
        public: true
        title: "Marca"

      # Línea asignada por la lógica híbrida; sigue nomenclatura Lxx del catálogo.
      - name: linea
        sql: "{CUBE}.linea"
        type: string
        public: true
        title: "Línea"
