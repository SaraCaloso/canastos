cubes:
  - name: cortesDiarios
    title: "Cortes de Caja"
    description: "Cortes de caja (X y Z) con ventas reportadas, efectivo y diferencias. WORKAROUND: Excluye fechas >= 2025-11-20 por schema drift en Parquet."
    
    # ⚠️ WORKAROUND TEMPORAL: Filtrar fechas >= 2025-11-20 en el sql
    # Los archivos Parquet del 20 Nov+ tienen campos numéricos como DOUBLE
    # mientras que la tabla los define como VARCHAR, causando HIVE_BAD_DATA
    # TODO: Remover este filtro cuando se regeneren los Parquets o se ajuste el schema
    sql: |
      SELECT *
      FROM canastos_tfx.tfx_table_cortes
      WHERE partition_date < DATE '2025-11-20'
    
    public: false

    joins: []

    dimensions:
      # --- PK OBLIGATORIA ---
      - name: id
        sql: "{CUBE}.numerocorte || '-' || {CUBE}.sucursal || '-' || CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        primary_key: true
        title: "ID Corte"

      # --- Dimensiones Básicas ---
      - name: numeroCorte
        sql: "{CUBE}.numerocorte"
        type: string
        title: "Número de Corte"
        description: "Folio consecutivo del corte"

      - name: fechaCorte
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha de Corte"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1 THEN 'January'
            WHEN 2 THEN 'February'
            WHEN 3 THEN 'March'
            WHEN 4 THEN 'April'
            WHEN 5 THEN 'May'
            WHEN 6 THEN 'June'
            WHEN 7 THEN 'July'
            WHEN 8 THEN 'August'
            WHEN 9 THEN 'September'
            WHEN 10 THEN 'October'
            WHEN 11 THEN 'November'
            WHEN 12 THEN 'December'
          END
        type: string
        title: "Mes"

      - name: diaSemana
        sql: |
          CASE EXTRACT(DOW FROM {CUBE}.partition_date)
            WHEN 0 THEN 'Sunday'
            WHEN 1 THEN 'Monday'
            WHEN 2 THEN 'Tuesday'
            WHEN 3 THEN 'Wednesday'
            WHEN 4 THEN 'Thursday'
            WHEN 5 THEN 'Friday'
            WHEN 6 THEN 'Saturday'
          END
        type: string
        title: "Día Semana"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: estacion
        sql: "{CUBE}.estacion"
        type: string
        title: "Estación/Caja"
        description: "ID de la caja que realizó el corte"

      - name: tipoCorte
        sql: "{CUBE}.corte"
        type: string
        title: "Tipo de Corte"
        description: "X (parcial) o Z (cierre de día)"

      - name: horaCorte
        sql: "{CUBE}.usuhora"
        type: string
        title: "Hora del Corte"

      - name: fechaRegistro
        sql: "{CUBE}.usufecha"
        type: string
        title: "Fecha de Registro"

    measures:
      # --- Medidas de Ventas Reportadas ---
      - name: ventasReportadasZ
        sql: "CAST({CUBE}.totalventas AS DOUBLE)"
        type: sum
        format: currency
        title: "Ventas Reportadas (Z)"
        description: "Total de ventas según reporte Z"

      - name: efectivoCaja
        sql: "CAST({CUBE}.totalcaja AS DOUBLE)"
        type: sum
        format: currency
        title: "Efectivo en Caja"
        description: "Dinero físico contabilizado en caja"

      - name: totalIngresos
        sql: "CAST({CUBE}.totalingresos AS DOUBLE)"
        type: sum
        format: currency
        title: "Total Ingresos"
        description: "Total de ingresos registrados"

      - name: ventasConImpuesto10
        sql: "CAST({CUBE}.ventasimpuesto10 AS DOUBLE)"
        type: sum
        format: currency
        title: "Ventas con Impuesto 10%"

      - name: impuesto10
        sql: "CAST({CUBE}.impuesto10 AS DOUBLE)"
        type: sum
        format: currency
        title: "Impuesto 10%"

      - name: ventasConImpuesto15
        sql: "CAST({CUBE}.ventasimpuesto15 AS DOUBLE)"
        type: sum
        format: currency
        title: "Ventas con Impuesto 15%"

      - name: impuesto15
        sql: "CAST({CUBE}.impuesto15 AS DOUBLE)"
        type: sum
        format: currency
        title: "Impuesto 15%"

      # --- Medidas de Clientes ---
      - name: clientesAtendidos
        sql: "CAST({CUBE}.clientesatendidos AS INTEGER)"
        type: sum
        title: "# Clientes Atendidos"
        description: "Número de clientes según reporte Z"

      # --- Medidas Calculadas ---
      - name: ticketPromedioZ
        sql: "CAST({CUBE}.totalventas AS DOUBLE) / NULLIF(CAST({CUBE}.clientesatendidos AS INTEGER), 0)"
        type: avg
        format: currency
        title: "Ticket Promedio (Z)"
        description: "Venta promedio por cliente según Z"

      - name: conteoCortes
        type: count
        title: "# Cortes Realizados"

    segments:
      - name: cortesZ
        sql: "{CUBE}.corte = 'z'"
        title: "Solo Cortes Z (Cierre de Día)"

      - name: cortesX
        sql: "{CUBE}.corte = 'x'"
        title: "Solo Cortes X (Parciales)"
