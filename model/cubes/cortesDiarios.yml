# =============================================================================
# CUBO: cortesDiarios
# =============================================================================
# Este cubo representa los CORTES DE CAJA (X y Z) registrados por estación.
# Un corte de caja es el resumen financiero de una caja en un momento dado:
#   - Corte X: parcial, la caja sigue abierta después del corte.
#   - Corte Z: cierre de día, la caja se liquida y reinicia.
#
# Fuente de datos: canastos_tfx.tfx_table_cortes
#
# ⚠️ FIX 2026-04:
# Relación con otros cubos:
#   → No tiene joins. Es un cubo independiente de cierre operativo.
#   → Complementa a "ventas" y "cortesDiarios" para cuadre de caja.
# =============================================================================

cubes:
  - name: cortesDiarios
    title: "Cortes de Caja"
    description: |
      Cortes de caja (X y Z) con ventas reportadas, efectivo y diferencias.

      FIX 2026-04: Se reemplazó el workaround de fecha (< 2025-11-20) por exclusión
      de TORREON ARCOIRIS y uso de TRY_CAST para manejar el schema drift en Parquet.
      Ahora incluye todos los datos históricos disponibles.

    # TRY_CAST en todos los campos numéricos para tolerar schema drift en Parquet
    # (columnas que a veces llegan como string y a veces como número).
    # Se excluye 'DPBodega-Test' porque es un entorno de pruebas, no producción.
    sql: |
      SELECT
        numerocorte,
        estacion,
        sucursal,
        corte,
        usuhora,
        usufecha,
        partition_date,
        clientesatendidos,
        cort_id,
        TRY_CAST(totalventas      AS DOUBLE) AS totalventas,       -- Total vendido según el corte
        TRY_CAST(totalcaja        AS DOUBLE) AS totalcaja,         -- Efectivo físico contado en caja
        TRY_CAST(totalingresos    AS DOUBLE) AS totalingresos,     -- Ingresos totales (todas las formas de pago)
        TRY_CAST(ventasimpuesto10 AS DOUBLE) AS ventasimpuesto10,  -- Base gravable al 16% de IVA
        TRY_CAST(impuesto10       AS DOUBLE) AS impuesto10,        -- Monto de IVA 16%
        TRY_CAST(ventasimpuesto15 AS DOUBLE) AS ventasimpuesto15,  -- Ventas exentas (tasa 0%)
        TRY_CAST(impuesto15       AS DOUBLE) AS impuesto15,        -- IVA 0% (siempre cero, requerido por estructura)
        TRY_CAST(clientesatendidos AS INTEGER) AS clientes_int     -- Cast a entero para sumas y promedios correctos
      FROM canastos_tfx.tfx_table_cortes
      WHERE sucursal != 'DPBodega-Test'   -- Excluir sucursal de pruebas

    public: false # No exponer este cube en el playgr   ound público

    # -------------------------------------------------------------------------
    # JOINS
    # -------------------------------------------------------------------------
    joins: [] # Sin relaciones a otros cubos por ahora

    # -------------------------------------------------------------------------
    # SEGMENTOS
    # Los segmentos son filtros predefinidos reutilizables.
    # Se pueden aplicar en cualquier consulta sin repetir el WHERE.
    # -------------------------------------------------------------------------
    segments:
      # Filtra únicamente cortes Z (cierre de día).
      # Usar en reportes de ventas diarias consolidadas por sucursal.
      - name: cortesZ
        sql: "{CUBE}.corte = 'z'"
        title: "Solo Cortes Z"

      # Filtra únicamente cortes X (parciales).
      # Usar para análisis de comportamiento intradía por caja.
      - name: cortesX
        sql: "{CUBE}.corte = 'x'"
        title: "Solo Cortes X"

      # Excluye la estación COBRANZA de los resultados.
      # COBRANZA registra pagos de crédito, no ventas directas en punto de venta;
      # incluirla distorsionaría métricas como ticket promedio o clientes atendidos.
      - name: sinCobranza
        sql: "{CUBE}.estacion != 'COBRANZA'"
        title: "Sin Estación Cobranza"

    # -------------------------------------------------------------------------
    # DIMENSIONES
    # -------------------------------------------------------------------------
    dimensions:
      # Llave primaria del corte. Usa cort_id que es único por registro en la tabla.
      - name: cortes_ID
        sql: "{CUBE}.cort_id"
        type: string
        primary_key: true # Necesario para joins futuros y consistencia del modelo
        title: "ID Corte"

      # Número consecutivo del corte dentro de la estación.
      - name: numeroCorte
        sql: "{CUBE}.numerocorte"
        type: string
        title: "Número de Corte"

      # -----------------------------------------------------------------------
      # Dimensiones de tiempo
      # partition_date es la fecha de partición del archivo Parquet;
      # se usa como fecha oficial del corte.
      # -----------------------------------------------------------------------

      # Se castea a VARCHAR para compatibilidad con filtros de texto en el frontend.
      - name: fechaCorte
        sql: "CAST({CUBE}.partition_date AS VARCHAR)"
        type: string
        title: "Fecha de Corte"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      # Útil para ordenar cronológicamente en gráficas y tablas.
      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      # Nombre legible para etiquetas en reportes y dashboards.
      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1  THEN 'Enero'      WHEN 2  THEN 'Febrero'    WHEN 3  THEN 'Marzo'
            WHEN 4  THEN 'Abril'      WHEN 5  THEN 'Mayo'       WHEN 6  THEN 'Junio'
            WHEN 7  THEN 'Julio'      WHEN 8  THEN 'Agosto'     WHEN 9  THEN 'Septiembre'
            WHEN 10 THEN 'Octubre'    WHEN 11 THEN 'Noviembre'  WHEN 12 THEN 'Diciembre'
          END
        type: string
        title: "Mes"

      # DOW: 0 = Domingo ... 6 = Sábado (convención PostgreSQL/Trino).
      - name: diaSemana
        sql: |
          CASE EXTRACT(DOW FROM {CUBE}.partition_date)
            WHEN 0 THEN 'Domingo'   WHEN 1 THEN 'Lunes'
            WHEN 2 THEN 'Martes'    WHEN 3 THEN 'Miércoles'
            WHEN 4 THEN 'Jueves'    WHEN 5 THEN 'Viernes'
            WHEN 6 THEN 'Sábado'
          END
        type: string
        title: "Día Semana"

      # -----------------------------------------------------------------------
      # Dimensiones operativas
      # -----------------------------------------------------------------------

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      # Cada sucursal puede tener varias estaciones (cajas) simultáneas.
      - name: estacion
        sql: "{CUBE}.estacion"
        type: string
        title: "Estación/Caja"

      # Tipo de corte realizado.
      # 'z' se hace al cerrar el día; 'x' es un corte intermedio sin cerrar la caja.
      - name: tipoCorte
        sql: "{CUBE}.corte"
        type: string
        title: "Tipo de Corte"
        description: "z = cierre de día, x = parcial"

      # Hora en que el cajero ejecutó el corte.
      - name: horaCorte
        sql: "{CUBE}.usuhora"
        type: string
        title: "Hora del Corte"

      # Puede diferir de partition_date si hay retrasos en la carga del archivo.
      - name: fechaRegistro
        sql: "{CUBE}.usufecha"
        type: string
        title: "Fecha de Registro"

    # -------------------------------------------------------------------------
    # MEDIDAS
    # -------------------------------------------------------------------------
    measures:
      # -----------------------------------------------------------------------
      # Ventas e ingresos
      # -----------------------------------------------------------------------

      # Monto total que el sistema reportó vendido en el corte.
      - name: ventasReportadasZ
        sql: "{CUBE}.totalventas"
        type: sum
        format: currency
        title: "Ventas Reportadas (Z)"

      # Dinero físico contado en caja.
      # Comparar con ventasReportadasZ para detectar faltantes o sobrantes.
      - name: efectivoCaja
        sql: "{CUBE}.totalcaja"
        type: sum
        format: currency
        title: "Efectivo en Caja"

      # Suma de todas las formas de pago (efectivo + tarjeta + crédito).
      - name: totalIngresos
        sql: "{CUBE}.totalingresos"
        type: sum
        format: currency
        title: "Total Ingresos"

      # -----------------------------------------------------------------------
      # Desglose de impuestos
      # El sistema registra tres tasas: 16% (IVA estándar), 0% (exento) y 8% (IEPS).
      # Las ventas con IEPS no tienen columna propia; se calculan por diferencia.
      # -----------------------------------------------------------------------

      # Base gravable antes de aplicar el 16% de IVA.
      - name: ventasConImpuesto10
        sql: "{CUBE}.ventasimpuesto10"
        type: sum
        format: currency
        title: "Ventas Base 16%"

      # Monto de IVA cobrado al 16%.
      - name: impuesto10
        sql: "{CUBE}.impuesto10"
        type: sum
        format: currency
        title: "IVA 16%"

      # Productos exentos de IVA (ej: alimentos sin procesar).
      - name: ventasConImpuesto15
        sql: "{CUBE}.ventasimpuesto15"
        type: sum
        format: currency
        title: "Ventas Exentas (0%)"

      # Siempre cero; se conserva por consistencia de esquema con el sistema origen.
      - name: impuesto15
        sql: "{CUBE}.impuesto15"
        type: sum
        format: currency
        title: "IVA 0%"

      # Lógica: el total de ventas contiene las tres tasas mezcladas.
      # Se restan las ventas con 16% (base + IVA) y las exentas;
      # el residuo corresponde a productos con IEPS 8%, que se divide entre 1.08
      # para obtener el precio sin impuesto.
      - name: ventas8
        sql: |
          (
            SUM({CUBE}.totalventas)
            - SUM({CUBE}.impuesto15)
            - SUM({CUBE}.impuesto10)
            - SUM({CUBE}.ventasimpuesto10)
            - SUM({CUBE}.ventasimpuesto15)
          ) / 1.08
        type: number
        format: currency
        title: "Ventas Base 8% (IEPS)"

      # IEPS = base IEPS × 8%.
      # Se recalcula desde la misma fórmula de ventas8 para evitar doble agregación.
      - name: impuesto8
        sql: |
          (
            (
              SUM({CUBE}.totalventas)
              - SUM({CUBE}.impuesto15)
              - SUM({CUBE}.impuesto10)
              - SUM({CUBE}.ventasimpuesto10)
              - SUM({CUBE}.ventasimpuesto15)
            ) / 1.08
          ) * 0.08
        type: number
        format: currency
        title: "IEPS 8%"

      # -----------------------------------------------------------------------
      # Métricas operativas
      # -----------------------------------------------------------------------

      - name: clientesAtendidos
        sql: "{CUBE}.clientes_int"
        type: sum
        title: "# Clientes Atendidos"

      # NULLIF evita división por cero cuando no se registraron clientes en el corte.
      - name: ticketPromedioZ
        sql: "{CUBE}.totalventas / NULLIF({CUBE}.clientes_int, 0)"
        type: avg
        format: currency
        title: "Ticket Promedio (Z)"

      # Conteo de registros; útil para auditoría y detección de cajas sin corte.
      - name: conteoCortes
        type: count
        title: "# Cortes Realizados"

      # Diferencia entre lo vendido y lo cobrado en efectivo.
      # Representa pagos realizados con tarjeta o crédito.
      - name: ventasNoEfectivo
        sql: "{CUBE}.totalventas - {CUBE}.totalcaja"
        type: sum
        format: currency
        title: "Ventas No Efectivo (Tarjeta/Crédito)"
