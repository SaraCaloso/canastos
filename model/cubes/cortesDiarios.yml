cubes:
  - name: cortesDiarios
    title: "Cortes de Caja"
    description: |
      Cortes de caja (X y Z) con ventas reportadas, efectivo y diferencias.

      FIX 2026-04: Se reemplazó el workaround de fecha (< 2025-11-20) por exclusión
      de TORREON ARCOIRIS y uso de TRY_CAST para manejar el schema drift en Parquet.
      Ahora incluye todos los datos históricos disponibles.

    sql: |
      SELECT
        numerocorte,
        estacion,
        sucursal,
        corte,
        usuhora,
        usufecha,
        partition_date,
        clientesatendidos,
        cort_id,
        -- TRY_CAST en lugar de CAST para tolerar filas con schema drift
        TRY_CAST(totalventas    AS DOUBLE) AS totalventas,
        TRY_CAST(totalcaja      AS DOUBLE) AS totalcaja,
        TRY_CAST(totalingresos  AS DOUBLE) AS totalingresos,
        TRY_CAST(ventasimpuesto10 AS DOUBLE) AS ventasimpuesto10,
        TRY_CAST(impuesto10     AS DOUBLE) AS impuesto10,
        TRY_CAST(ventasimpuesto15 AS DOUBLE) AS ventasimpuesto15,
        TRY_CAST(impuesto15     AS DOUBLE) AS impuesto15,
        TRY_CAST(clientesatendidos AS INTEGER) AS clientes_int
      FROM canastos_tfx.tfx_table_cortes
      WHERE AND sucursal != 'DPBodega-Test'

    public: false

    joins: []

    dimensions:
      - name: id
        sql: "{CUBE}.cort_id"
        type: string
        primary_key: true
        title: "ID Corte"

      - name: numeroCorte
        sql: "{CUBE}.numerocorte"
        type: string
        title: "Número de Corte"

      - name: fechaCorte
        sql: "{CUBE}.partition_date"
        type: time
        title: "Fecha de Corte"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.partition_date)"
        type: number
        title: "Año"

      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.partition_date)"
        type: number
        title: "Mes (Num)"

      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.partition_date)
            WHEN 1  THEN 'Enero'      WHEN 2  THEN 'Febrero'    WHEN 3  THEN 'Marzo'
            WHEN 4  THEN 'Abril'      WHEN 5  THEN 'Mayo'       WHEN 6  THEN 'Junio'
            WHEN 7  THEN 'Julio'      WHEN 8  THEN 'Agosto'     WHEN 9  THEN 'Septiembre'
            WHEN 10 THEN 'Octubre'    WHEN 11 THEN 'Noviembre'  WHEN 12 THEN 'Diciembre'
          END
        type: string
        title: "Mes"

      - name: diaSemana
        sql: |
          CASE EXTRACT(DOW FROM {CUBE}.partition_date)
            WHEN 0 THEN 'Domingo'   WHEN 1 THEN 'Lunes'
            WHEN 2 THEN 'Martes'    WHEN 3 THEN 'Miércoles'
            WHEN 4 THEN 'Jueves'    WHEN 5 THEN 'Viernes'
            WHEN 6 THEN 'Sábado'
          END
        type: string
        title: "Día Semana"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

      - name: estacion
        sql: "{CUBE}.estacion"
        type: string
        title: "Estación/Caja"

      - name: tipoCorte
        sql: "{CUBE}.corte"
        type: string
        title: "Tipo de Corte"
        description: "z = cierre de día, x = parcial"

      - name: horaCorte
        sql: "{CUBE}.usuhora"
        type: string
        title: "Hora del Corte"

      - name: fechaRegistro
        sql: "{CUBE}.usufecha"
        type: string
        title: "Fecha de Registro"

    measures:
      - name: ventasReportadasZ
        sql: "{CUBE}.totalventas"
        type: sum
        format: currency
        title: "Ventas Reportadas (Z)"

      - name: efectivoCaja
        sql: "{CUBE}.totalcaja"
        type: sum
        format: currency
        title: "Efectivo en Caja"

      - name: totalIngresos
        sql: "{CUBE}.totalingresos"
        type: sum
        format: currency
        title: "Total Ingresos"

      - name: ventasConImpuesto10
        sql: "{CUBE}.ventasimpuesto10"
        type: sum
        format: currency
        title: "Ventas Base 16%"

      - name: impuesto10
        sql: "{CUBE}.impuesto10"
        type: sum
        format: currency
        title: "IVA 16%"

      - name: ventasConImpuesto15
        sql: "{CUBE}.ventasimpuesto15"
        type: sum
        format: currency
        title: "Ventas Exentas (0%)"

      - name: impuesto15
        sql: "{CUBE}.impuesto15"
        type: sum
        format: currency
        title: "IVA 0%"

      # ── Tasa 8% derivada ───────────────────────────────────────────────────
      - name: ventas8
        sql: |
          (
            SUM({CUBE}.totalventas)
            - SUM({CUBE}.impuesto15)
            - SUM({CUBE}.impuesto10)
            - SUM({CUBE}.ventasimpuesto10)
            - SUM({CUBE}.ventasimpuesto15)
          ) / 1.08
        type: number
        format: currency
        title: "Ventas Base 8% (IEPS)"

      - name: impuesto8
        sql: |
          (
            (
              SUM({CUBE}.totalventas)
              - SUM({CUBE}.impuesto15)
              - SUM({CUBE}.impuesto10)
              - SUM({CUBE}.ventasimpuesto10)
              - SUM({CUBE}.ventasimpuesto15)
            ) / 1.08
          ) * 0.08
        type: number
        format: currency
        title: "IEPS 8%"

      - name: clientesAtendidos
        sql: "{CUBE}.clientes_int"
        type: sum
        title: "# Clientes Atendidos"

      - name: ticketPromedioZ
        sql: "{CUBE}.totalventas / NULLIF({CUBE}.clientes_int, 0)"
        type: avg
        format: currency
        title: "Ticket Promedio (Z)"

      - name: conteoCortes
        type: count
        title: "# Cortes Realizados"

    segments:
      - name: cortesZ
        sql: "{CUBE}.corte = 'z'"
        title: "Solo Cortes Z"

      - name: cortesX
        sql: "{CUBE}.corte = 'x'"
        title: "Solo Cortes X"

      - name: sinCobranza
        sql: "{CUBE}.estacion != 'COBRANZA'"
        title: "Sin Estación Cobranza"
