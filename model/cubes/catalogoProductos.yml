# =============================================================================
# CUBO: catalogoProductos
# =============================================================================
# Este cubo representa el CATÁLOGO DE PRODUCTOS NUMÉRICOS del inventario.
# Solo incluye artículos cuyo SKU puede convertirse a BIGINT (numéricos puros).
# Los SKUs alfanuméricos están cubiertos por el cubo "productosAlfaClasificados".
#
# Fuente de datos: canastos_tfx.tfx_table_inv
#
# ⚠️ COBERTURA PARCIAL:
#   Este cubo NO cubre productos alfanuméricos (ej: 'C6', 'FCU', 'GAS').
#   Para esos casos usar "productosAlfaClasificados".
#
# NORMALIZACIÓN DE SKU:
#   El SKU se expone en dos formatos para facilitar joins con otras tablas
#   que pueden tener el artículo como string o como entero:
#     sku_str → VARCHAR  (para joins con tablas que guardan el código como texto)
#     sku_int → BIGINT   (para joins con tablas que guardan el código como número)
#
# El GROUP BY en el SQL base garantiza unicidad a nivel empresa
# (un SKU = un producto, independiente de la sucursal).
#
# Relación con otros cubos:
#   → Se usa como dimensión de lookup desde "historicoInventario" y "partidas".
#   → No tiene joins propios declarados; los joins se declaran en el cubo hijo.
# =============================================================================

cubes:
  - name: catalogoProductos
    title: "Catálogo de Productos"
    description: "Catálogo SOLO de productos NUMÉRICOS del inventario - Alfanuméricos pendientes"
    public: true

    # El filtro TRY_CAST(articulo AS BIGINT) IS NOT NULL descarta todos los SKUs
    # alfanuméricos. El GROUP BY colapsa múltiples filas del mismo artículo
    # (una por sucursal en el histórico) en un único registro por producto.
    sql: |
      SELECT
        CAST(articulo AS VARCHAR) as sku_str,   -- SKU como texto para joins con tablas string
        CAST(articulo AS BIGINT)  as sku_int,   -- SKU como entero para joins con tablas numéricas
        MAX(descrip) as descripcion,            -- Nombre del producto (MAX para desduplicar)
        MAX(linea)   as linea,                  -- Línea/categoría del producto
        MAX(marca)   as marca                   -- Marca del producto
      FROM canastos_tfx.tfx_table_inv
      WHERE TRY_CAST(articulo AS BIGINT) IS NOT NULL   -- Solo SKUs numéricos
      GROUP BY
        CAST(articulo AS VARCHAR),
        CAST(articulo AS BIGINT)                -- Un registro por SKU único a nivel empresa

    # -------------------------------------------------------------------------
    # DIMENSIONES
    # -------------------------------------------------------------------------
    dimensions:
      # Llave primaria en formato string.
      # Se usa VARCHAR y no BIGINT para mantener consistencia con otros cubos
      # que referencian el SKU como texto.
      - name: catalogoProductos_ID
        sql: "{CUBE}.sku_str"
        type: string
        primary_key: true
        title: "ID Producto"

      # SKU en formato texto. Usar para joins con tablas que almacenan el
      # artículo como VARCHAR (ej: tfx_table_ventas, tfx_table_cortes).
      - name: sku
        sql: "{CUBE}.sku_str"
        type: string
        title: "SKU (String)"

      # SKU en formato numérico. Usar para joins con tablas que almacenan el
      # artículo como INTEGER o BIGINT (ej: tfx_table_partvta).
      - name: skuInt
        sql: "{CUBE}.sku_int"
        type: number
        title: "SKU (Numérico)"

      - name: descripcion
        sql: "{CUBE}.descripcion"
        type: string
        title: "Descripción"

      # Línea o categoría del producto (ej: L03 = Botanas, L06 = Dulces).
      - name: linea
        sql: "{CUBE}.linea"
        type: string
        title: "Línea"

      - name: marca
        sql: "{CUBE}.marca"
        type: string
        title: "Marca"
