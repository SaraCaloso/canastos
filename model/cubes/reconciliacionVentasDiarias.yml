# =============================================================================
# CUBO: reconciliacionVentasDiarias
# =============================================================================
# Este cubo representa las VENTAS DIARIAS AGREGADAS desde el sistema ERP.
# Su único propósito es servir como el "lado sistema" en la reconciliación
# contra los cortes Z del POS (cubo reconciliacionCortesZ).
#
# Fuente de datos: canastos_tfx.tfx_table_ventas
#
# USO RESTRINGIDO:
#   Este cubo NO debe usarse para análisis general de ventas.
#   Para eso usar 'analiticaVentas' o 'analiticaDevoluciones'.
#   La agregación previa en el SQL hace que no sea adecuado para
#   análisis a nivel de folio o cliente.
#
# FILTROS APLICADOS EN LA FUENTE:
#   - Solo documentos VIABLES (is_viable = true)
#   - Solo documentos COMPLETADOS (estado = 'CO')
#   - Ventas:      REM + FAC
#   - Devoluciones: DEV + DV
#   - Excluye 'DPBodega-Test' (sucursal de pruebas)
#   - Excluye CEDIS implícitamente (ventas mayoristas B2B sin POS)
#
# La agregación ocurre en el SQL base (GROUP BY fecha + sucursal),
# produciendo UNA fila por día+sucursal lista para el join con cortes Z.
#
# Relación con otros cubos:
#   → Se une con "reconciliacionCortesZ" en la vista "reconciliacionDiaria"
#     por fecha + sucursal (one_to_one entre cubos ya agregados).
# =============================================================================

cubes:
  - name: reconciliacionVentasDiarias
    title: "Ventas Diarias Sistema (Reconciliación)"
    description: |
      Ventas agregadas por día y sucursal desde el sistema ERP.
      Usado exclusivamente para reconciliación con cortes Z.

      LÓGICA:
      - Solo documentos VIABLES (is_viable = true)
      - Solo documentos COMPLETADOS (estado = 'CO')
      - Ventas: REM + FAC
      - Devoluciones: DEV + DV
      - Excluye CEDIS (ventas mayoristas B2B sin POS)
      - Excluye DPBodega-Test (sucursal de prueba)

      IMPORTANTE: Este cube NO debe usarse para análisis general de ventas.
      Para eso usar 'analiticaVentas' o 'analiticaDevoluciones'.

    # Toda la lógica de clasificación y agregación vive en este SQL.
    # El CASE por tipo_doc separa ventas de devoluciones en columnas distintas,
    # evitando tener que filtrar en el cubo o en las vistas consumidoras.
    sql: |
      SELECT
        partition_date AS fecha,
        sucursal,

        -- Ventas brutas: solo REM y FAC completadas y viables
        SUM(CASE WHEN tipo_doc IN ('REM', 'FAC') THEN CAST(importe    AS DOUBLE) ELSE 0 END) AS ventas_brutas,

        -- Devoluciones: solo DEV y DV completadas y viables
        SUM(CASE WHEN tipo_doc IN ('DEV', 'DV')  THEN CAST(importe    AS DOUBLE) ELSE 0 END) AS devoluciones,

        -- Ventas netas: REM/FAC suman, DEV/DV restan
        SUM(CASE
          WHEN tipo_doc IN ('REM', 'FAC') THEN  CAST(importe AS DOUBLE)
          WHEN tipo_doc IN ('DEV', 'DV')  THEN -CAST(importe AS DOUBLE)
          ELSE 0
        END) AS ventas_netas,

        -- Conteos por tipo de documento
        SUM(CASE WHEN tipo_doc IN ('REM', 'FAC') THEN 1 ELSE 0 END) AS num_ventas,
        SUM(CASE WHEN tipo_doc IN ('DEV', 'DV')  THEN 1 ELSE 0 END) AS num_devoluciones,

        -- Componentes adicionales (solo de ventas, no de devoluciones)
        SUM(CASE WHEN tipo_doc IN ('REM', 'FAC') THEN CAST(descuento  AS DOUBLE) ELSE 0 END) AS descuentos,
        SUM(CASE WHEN tipo_doc IN ('REM', 'FAC') THEN CAST(impuesto   AS DOUBLE) ELSE 0 END) AS impuestos,
        SUM(CASE WHEN tipo_doc IN ('REM', 'FAC') THEN CAST(costo      AS DOUBLE) ELSE 0 END) AS costos

      FROM canastos_tfx.tfx_table_ventas
      WHERE is_viable = true          -- Solo documentos válidos para análisis
        AND estado = 'CO'             -- Solo documentos completados
        AND sucursal != 'DPBodega-Test'  -- Excluir sucursal de pruebas
      GROUP BY partition_date, sucursal  -- Una fila por día + sucursal

    public: false # Solo para uso interno a través de la vista reconciliacionDiaria

    joins: [] # El join con reconciliacionCortesZ se declara en la vista

    # -------------------------------------------------------------------------
    # DIMENSIONES
    # -------------------------------------------------------------------------
    dimensions:
      # Llave primaria compuesta: fecha + sucursal en texto.
      # Ambos campos forman la clave del join con reconciliacionCortesZ.
      - name: id
        sql: "CAST({CUBE}.fecha AS VARCHAR) || '-' || {CUBE}.sucursal"
        type: string
        primary_key: true
        title: "ID Agregado"
        description: "Clave única: fecha-sucursal"

      # Fecha de la venta; equivale a partition_date de la tabla origen.
      - name: fecha
        sql: "{CUBE}.fecha"
        type: time
        title: "Fecha"
        description: "Fecha de la venta (agregación diaria)"

      - name: anio
        sql: "EXTRACT(YEAR FROM {CUBE}.fecha)"
        type: number
        title: "Año"

      # Útil para ordenar cronológicamente en gráficas y tablas.
      - name: numMes
        sql: "EXTRACT(MONTH FROM {CUBE}.fecha)"
        type: number
        title: "Mes (Num)"

      # Nombre legible para etiquetas en reportes y dashboards.
      - name: nombreMes
        sql: |
          CASE EXTRACT(MONTH FROM {CUBE}.fecha)
            WHEN 1 THEN 'January'   WHEN 2  THEN 'February'  WHEN 3  THEN 'March'
            WHEN 4 THEN 'April'     WHEN 5  THEN 'May'        WHEN 6  THEN 'June'
            WHEN 7 THEN 'July'      WHEN 8  THEN 'August'     WHEN 9  THEN 'September'
            WHEN 10 THEN 'October'  WHEN 11 THEN 'November'   WHEN 12 THEN 'December'
          END
        type: string
        title: "Mes"

      # DOW: 0 = Sunday ... 6 = Saturday (convención PostgreSQL/Trino).
      - name: diaSemana
        sql: |
          CASE EXTRACT(DOW FROM {CUBE}.fecha)
            WHEN 0 THEN 'Sunday'    WHEN 1 THEN 'Monday'    WHEN 2 THEN 'Tuesday'
            WHEN 3 THEN 'Wednesday' WHEN 4 THEN 'Thursday'  WHEN 5 THEN 'Friday'
            WHEN 6 THEN 'Saturday'
          END
        type: string
        title: "Día Semana"

      - name: sucursal
        sql: "{CUBE}.sucursal"
        type: string
        title: "Sucursal"

    # -------------------------------------------------------------------------
    # MEDIDAS
    # Los valores ya vienen pre-agregados desde el SQL base.
    # Las medidas aquí solo suman la columna correspondiente.
    # -------------------------------------------------------------------------
    measures:
      # Total vendido (REM + FAC) antes de descontar devoluciones.
      # Base de comparación contra ventasZ del POS en reconciliacionDiaria.
      - name: ventasBrutas
        sql: "{CUBE}.ventas_brutas"
        type: sum
        format: currency
        title: "Ventas Brutas Sistema"
        description: "Suma de ventas (REM + FAC) completadas y viables"

      # Monto devuelto (DEV + DV) en el período.
      # No se refleja en los cortes Z; explica parte de la diferencia sistema vs POS.
      - name: devoluciones
        sql: "{CUBE}.devoluciones"
        type: sum
        format: currency
        title: "Devoluciones Sistema"
        description: "Suma de devoluciones (DEV + DV) completadas y viables"

      # Resultado real: ventas brutas menos devoluciones.
      - name: ventasNetas
        sql: "{CUBE}.ventas_netas"
        type: sum
        format: currency
        title: "Ventas Netas Sistema"
        description: "Ventas brutas menos devoluciones"

      # Número de transacciones de venta del día en la sucursal.
      - name: numVentas
        sql: "{CUBE}.num_ventas"
        type: sum
        title: "# Ventas"
        description: "Número de documentos de venta"

      # Número de transacciones de devolución del día en la sucursal.
      - name: numDevoluciones
        sql: "{CUBE}.num_devoluciones"
        type: sum
        title: "# Devoluciones"
        description: "Número de documentos de devolución"

      # Descuentos aplicados en ventas del día.
      - name: descuentos
        sql: "{CUBE}.descuentos"
        type: sum
        format: currency
        title: "Descuentos"

      # Impuestos registrados en ventas del día.
      - name: impuestos
        sql: "{CUBE}.impuestos"
        type: sum
        format: currency
        title: "Impuestos"

      # Costo de los artículos vendidos; permite calcular margen bruto.
      - name: costos
        sql: "{CUBE}.costos"
        type: sum
        format: currency
        title: "Costos"
