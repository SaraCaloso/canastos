views:
  - name: analiticaVentas
    title: "1. Analítica de Ventas"
    description: "Vista Maestra de Ventas con Impuestos Corregidos (FAC > TIC > REM)"
    
    cubes:
      - join_path: partidasVenta
        includes:
          - venta
          - skuRaw
          - sucursal
          - is_viable
          - precio
          - cantidad_dim
          - fecha
          - anio
          - numMes
          - nombreMes
          - diaSemana
          - name: ingresoTotalViable
            alias: ventaBruta_base
          - totalImpuestosCalculados
          - impuestoIVA16
          - impuestoIEPS8

      - join_path: partidasVenta.ventas
        includes:
          - montoTotal
          - montoSinDuplicar
          - impuestoSinDuplicar
          - cliente

      - join_path: catalogoProductos
        includes:
          - name: descripcion
            alias: nombreProducto
          - linea
          - marca

    dimensions:
      - name: id
        sql: "{partidasVenta.venta} || '-' || {partidasVenta.skuRaw} || '-' || {partidasVenta.sucursal}"
        type: string
        primary_key: true
        title: "ID Único"

      - name: sku
        sql: "{partidasVenta.skuRaw}"
        type: string
        title: "SKU"

      - name: codigoCliente
        sql: "{ventas.cliente}"
        type: string
        title: "Código Cliente"

      - name: numeroTicket
        sql: "{partidasVenta.venta}"
        type: string
        title: "Folio Ticket"

    measures:
      - name: ventaNeta
        sql: "{partidasVenta.ingresoTotalViable}"
        type: number
        format: currency
        title: "Venta Neta"
        description: "Suma de los precios unitarios por cantidad (Sin impuestos)"

      - name: impuestosTotales
        sql: "{partidasVenta.totalImpuestosCalculados}"
        type: number
        format: currency
        title: "Impuestos ($)"
        description: "Total de impuestos calculados (IVA + IEPS) filtrando duplicados por jerarquía de documentos."

      - name: ventaTotal
        sql: "{partidasVenta.ingresoTotalViable} + {partidasVenta.totalImpuestosCalculados}"
        type: number
        format: currency
        title: "Venta Total (Final)"
        description: "Venta Bruta + Impuestos calculados"

      - name: iva16
        sql: "{partidasVenta.impuestoIVA16}"
        type: number
        format: currency
        title: "IVA 16%"

      - name: ieps8
        sql: "{partidasVenta.impuestoIEPS8}"
        type: number
        format: currency
        title: "IEPS 8%"

      - name: cantidadVendida
        sql: "{partidasVenta.cantidad_dim}"
        type: sum
        title: "Unidades Vendidas"

      - name: conteoTickets
        sql: "{partidasVenta.conteoTickets}"
        type: number
        title: "# Tickets"

