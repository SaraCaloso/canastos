views:
  - name: analiticaVentas
    title: "1. Analítica de Ventas"
    description: "Vista Maestra de Ventas con Impuestos Corregidos (FAC > TIC > REM)"
    
    cubes:
      - join_path: partidasVenta
        includes:
          - venta
          - skuRaw
          - sucursal
          - fecha
          - anio
          - numMes
          - nombreMes
          - diaSemana
          - totalImpuestosCalculados
          - impuestoIVA16
          - impuestoIEPS8

    dimensions:
      - name: id
        sql: "{partidasVenta.id}"
        type: string
        primary_key: true

      - name: folioTicket
        sql: "{partidasVenta.venta}"
        type: string
        title: "Folio Ticket"

      - name: sucursal
        sql: "{partidasVenta.sucursal}"
        type: string
        title: "Sucursal"

      - name: fecha
        sql: "{partidasVenta.fecha}"
        type: time
        title: "Fecha Venta"

    measures:
      - name: ventaNeta
        sql: "{partidasVenta.ingresoTotalViable}"
        type: number
        format: currency
        title: "Venta Neta (Bruta)"

      - name: impuestosTotales
        sql: "{partidasVenta.totalImpuestosCalculados}"
        type: number
        format: currency
        title: "Impuestos ($)"
        description: "Suma de IVA y IEPS sin duplicados por documentos."

      - name: ventaTotal
        sql: "{partidasVenta.ingresoTotalViable} + {partidasVenta.totalImpuestosCalculados}"
        type: number
        format: currency
        title: "Venta Total (Final)"

      - name: iva16
        sql: "{partidasVenta.impuestoIVA16}"
        type: number
        format: currency
        title: "IVA 16%"

      - name: ieps8
        sql: "{partidasVenta.impuestoIEPS8}"
        type: number
        format: currency
        title: "IEPS 8%"

      - name: tickets
        sql: "{partidasVenta.conteoTickets}"
        type: number
        title: "# Tickets"

