views:
  - name: analiticaVentas
    title: "1. Analítica de Ventas"
    description: "Vista Maestra de Ventas"
    
    cubes:
      - join_path: partidasVenta
        includes:
          - venta
          - skuRaw
          - sucursal
          - is_viable
          - precio
          - impuesto
          - cantidad_dim
          - costo_unitario_calc
          - fecha
          - anio
          - numMes
          - nombreMes
          - diaSemana
      - join_path: partidasVenta.ventas
        includes:
          - montoTotal
      # ELIMINADO join a clientes — causaba INNER JOIN que descartaba ventas
      # sin cliente en tfx_table_clients (mostrador, público general, etc.)
      - join_path: catalogoProductos
        includes:
          - name: descripcion
            alias: nombreProducto
          - linea
          - marca

    dimensions:
      - name: id
        sql: "{partidasVenta.venta} || '-' || {partidasVenta.skuRaw}"
        type: string
        primary_key: true
        title: "ID Único"

      - name: sku
        sql: "{partidasVenta.skuRaw}"
        type: string
        title: "SKU"

      - name: codigoCliente
        sql: "{ventas.cliente}"
        type: string
        title: "Código Cliente"

      - name: numeroTicket
        sql: "{partidasVenta.venta}"
        type: string
        title: "Folio Ticket"

    measures:
      - name: ingresoTotal
        sql: "{partidasVenta.cantidad_dim} * {partidasVenta.precio}"
        type: sum
        format: currency
        title: "Venta Neta ($)"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]

      - name: impuestosTotales
        sql: "{partidasVenta.impuesto}"
        type: sum
        format: currency
        title: "Impuestos en tickets"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]

      - name: costoTotal
        sql: "{partidasVenta.cantidad_dim} * {partidasVenta.costo_unitario_calc}"
        type: sum
        format: currency
        title: "Costo Total ($)"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]

      - name: utilidadBruta
        sql: "({partidasVenta.cantidad_dim} * {partidasVenta.precio}) - ({partidasVenta.cantidad_dim} * {partidasVenta.costo_unitario_calc})"
        type: sum
        format: currency
        title: "Utilidad Bruta ($)"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]

      - name: cantidadVendida
        sql: "{partidasVenta.cantidad_dim}"
        type: sum
        title: "Unidades Vendidas"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]

      - name: conteoTickets
        sql: "{partidasVenta.venta}"
        type: count_distinct
        title: "# Tickets"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]

      - name: valorTicketPromedio
        sql: "{ingresoTotal} / NULLIF({conteoTickets}, 0)"
        type: number
        format: currency
        title: "Ticket Promedio (AOV)"
