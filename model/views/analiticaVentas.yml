views:
  # ============================================================
  # VISTA 1: Totales por ticket — cuadra con Excel/ERP
  # Fuente: tfx_table_ventas (cabecero)
  # Usar para: reportes financieros, conciliación con ERP
  # ============================================================
  - name: resumenVentas
    title: "1. Resumen de Ventas (cuadra con Excel)"
    description: |
      Totales monetarios desde el cabecero de ventas.
      Los importes incluyen impuestos, igual que el reporte Excel del ERP.
      Usar esta vista para conciliar contra reportes financieros.

    cubes:
      - join_path: ventas
        includes:
          - numeroVenta
          - tipoDocumento
          - sucursal
          - cliente
          - fechaTransaccion
          - anio
          - numMes
          - nombreMes
          - diaSemana
          - montoSinDuplicar    # ✅ cuadra con Excel
          - impuestoTotal
          - conteoFolios

      - join_path: ventas.clientes
        includes:
          - name: nombreCliente
            alias: nombreCliente

    dimensions:
      - name: id
        sql: "{ventas.numeroVenta} || '-' || {ventas.sucursal} || '-' || {ventas.tipoDocumento}"
        type: string
        primary_key: true
        title: "ID"

      - name: folio
        sql: "{ventas.numeroVenta}"
        type: string
        title: "Folio ERP"

      - name: cliente
        sql: "{ventas.cliente}"
        type: string
        title: "Código Cliente"

    measures:
      - name: ventaTotal
        sql: "{ventas.montoSinDuplicar}"
        type: number
        format: currency
        title: "✅ Venta Total (con impuesto)"
        description: "Cuadra con columna 'Total' del Excel ERP"

      - name: ticketPromedio
        sql: "{ventas.montoSinDuplicar} / NULLIF({ventas.conteoFolios}, 0)"
        type: number
        format: currency
        title: "Ticket Promedio"

      - name: numeroTickets
        sql: "{ventas.conteoFolios}"
        type: number
        title: "# Tickets"

  # ============================================================
  # VISTA 2: Detalle por artículo — análisis de rentabilidad
  # Fuente: tfx_table_partvta (partidas)
  # Usar para: margen por SKU, análisis de producto, costo
  # NOTA: Los totales NO cuadran exactamente con Excel
  #       porque los folios son diferentes (503xxx vs 191xxx)
  # ============================================================
  - name: analiticaVentas
    title: "2. Analítica por Artículo (margen y SKU)"
    description: |
      Detalle por artículo desde tfx_table_partvta.
      Usar para análisis de rentabilidad, margen, SKU, y cantidad vendida.
      
      ⚠️ Los totales monetarios NO cuadran con el Excel ERP porque los folios
      de partvta (503xxx) son diferentes a los folios del ERP (191xxx).
      Para conciliación financiera, usar vista 'resumenVentas'.

    cubes:
      - join_path: partidasVenta
        includes:
          - venta
          - skuRaw
          - descripcion
          - sucursal
          - fecha
          - anio
          - numMes
          - nombreMes
          - diaSemana
          - ingreso
          - impuestos
          - ingresoConImpuesto
          - costo
          - margen
          - cantidad
          - conteoTickets
          - conteoLineas

      - join_path: catalogoProductos
        includes:
          - name: descripcion
            alias: nombreProducto
          - linea
          - marca

    dimensions:
      - name: id
        sql: "{partidasVenta.venta} || '-' || {partidasVenta.skuRaw}"
        type: string
        primary_key: true
        title: "ID Único"

      - name: sku
        sql: "{partidasVenta.skuRaw}"
        type: string
        title: "SKU"

      - name: folio
        sql: "{partidasVenta.venta}"
        type: string
        title: "Folio Interno"

    measures:
      - name: ventaBase
        sql: "{partidasVenta.ingreso}"
        type: number
        format: currency
        title: "Venta Base (sin impuesto)"

      - name: impuestosPartidas
        sql: "{partidasVenta.impuestos}"
        type: number
        format: currency
        title: "Impuestos"

      - name: ventaConImpuesto
        sql: "{partidasVenta.ingresoConImpuesto}"
        type: number
        format: currency
        title: "Venta Total (con impuesto)"

      - name: costoTotal
        sql: "{partidasVenta.costo}"
        type: number
        format: currency
        title: "Costo Total"

      - name: utilidadBruta
        sql: "{partidasVenta.margen}"
        type: number
        format: currency
        title: "Utilidad Bruta"

      - name: margenPct
        sql: "{partidasVenta.margen} / NULLIF({partidasVenta.ingreso}, 0) * 100"
        type: number
        format: percent
        title: "Margen %"

      - name: unidadesVendidas
        sql: "{partidasVenta.cantidad}"
        type: number
        title: "Unidades"

      - name: ticketPromedio
        sql: "{partidasVenta.ingresoConImpuesto} / NULLIF({partidasVenta.conteoTickets}, 0)"
        type: number
        format: currency
        title: "Ticket Promedio"
