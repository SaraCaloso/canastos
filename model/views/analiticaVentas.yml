views:
  - name: analiticaVentas
    title: "1. Analítica de Ventas"
    description: "Vista Maestra de Ventas con Impuestos Corregidos"
 
    cubes:
      - join_path: partidasVenta
        includes:
          - sucursal
          - fecha
          - anio
          - numMes
          - nombreMes
          - diaSemana
          - is_viable
          - skuRaw
          - venta
          - precio
          - cantidad_dim
          - name: ingresoTotalViable
            alias: ventaBruta
          - name: impuestoIVA16
            alias: iva16
          - name: impuestoIEPS8
            alias: ieps8
          - name: totalImpuestosCalculados
            alias: impuestosTotales
          - descuentoTotal
          - cantidadVendida
          - conteoTickets

      - join_path: partidasVenta.ventas
        includes:
          - montoTotal
          - montoSinDuplicar
         # - impuestoSinDuplicar
          - cliente
          - tipoDocumento

      - join_path: catalogoProductos
        includes:
          - name: descripcion
            alias: nombreProducto
          - linea
          - marca

    dimensions:
      - name: id
        sql: "{partidasVenta.venta} || '-' || {partidasVenta.skuRaw}"
        type: string
        primary_key: true
        title: "ID Único"

      - name: sku
        sql: "{partidasVenta.skuRaw}"
        type: string
        title: "SKU"

      - name: codigoCliente
        sql: "{partidasVenta.ventas.cliente}"
        type: string
        title: "Código Cliente"

      - name: numeroTicket
        sql: "{partidasVenta.venta}"
        type: string
        title: "Folio Ticket"

    measures:
    #  - name: ventaNeta
     #   sql: "{partidasVenta.ingresoTotalViable}"
      #  type: number
       # format: currency
        #title: "Venta Neta"

      # FIX: quitados los filters — ya están definidos en partidasVenta
