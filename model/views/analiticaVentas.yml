views:
  - name: analiticaVentas
    title: "1. Analítica de Ventas"
    description: "Vista Maestra de Ventas con Impuestos y Unidades"
    
    cubes:
      - join_path: partidasVenta
        includes:
          - venta
          - sucursal
          - fecha
          - ingresoTotalViable
          - impuestoIVA16
          - impuestoIEPS8
          - margen
          - cantidadVendida
          - conteoTickets

      - join_path: partidasVenta.ventas
        includes:
          - montoSinDuplicar
          - impuestoSinDuplicar
          - tipoDocumento

      - join_path: catalogoProductos
        includes:
          - name: descripcion
            alias: nombreProducto
          - linea
          - marca

    dimensions:
      - name: id
        sql: "{partidasVenta.id}"
        type: string
        primary_key: true

      - name: codigoCliente
        sql: "{ventas.cliente}"
        type: string
        title: "Código Cliente"

    # Se agregó el 'type' requerido por Cube.js en todas las medidas
    measures:
      - name: ventaNeta
        sql: "{partidasVenta.ingresoTotalViable}"
        type: number
        format: currency
        title: "Venta Neta ($)"

      - name: iva16
        sql: "{partidasVenta.impuestoIVA16}"
        type: number
        format: currency
        title: "IVA 16%"

      - name: ieps8
        sql: "{partidasVenta.impuestoIEPS8}"
        type: number
        format: currency
        title: "IEPS 8%"

      - name: utilidad
        sql: "{partidasVenta.margen}"
        type: number
        format: currency
        title: "Utilidad Bruta"

      - name: tickets
        sql: "{partidasVenta.conteoTickets}"
        type: number
        title: "# Tickets"

      - name: unidades
        sql: "{partidasVenta.cantidadVendida}"
        type: number
        title: "Unidades Vendidas"
