views:
  - name: analiticaVentas
    title: "1. Analítica de Ventas"
    description: "Vista Maestra de Ventas con Impuestos Corregidos y Lógica Anti-Duplicados"
    
    cubes:
      - join_path: partidasVenta
        includes:
          - venta
          - skuRaw
          - sucursal
          - is_viable
          - precio
          - cantidad_dim
          - fecha
          - nombreMes
          - ingresoTotalViable
          - impuestoIVA16
          - impuestoIEPS8
          - margen

      - join_path: partidasVenta.ventas
        includes:
          - montoTotal
          - montoSinDuplicar
          - impuestoSinDuplicar
          - cliente
          - tipoDocumento

      - join_path: catalogoProductos
        includes:
          - name: descripcion
            alias: nombreProducto
          - linea
          - marca

    dimensions:
      - name: id
        sql: "{partidasVenta.venta} || '-' || {partidasVenta.skuRaw} || '-' || {partidasVenta.sucursal}"
        type: string
        primary_key: true
        title: "ID Único"

      - name: sku
        sql: "{partidasVenta.skuRaw}"
        type: string
        title: "SKU"

      - name: codigoCliente
        sql: "{ventas.cliente}"
        type: string
        title: "Código Cliente"

      - name: numeroTicket
        sql: "{partidasVenta.venta}"
        type: string
        title: "Folio Ticket"

    measures:
      - name: ventaNeta
        sql: "{partidasVenta.ingresoTotalViable}"
        type: number
        format: currency
        title: "Venta Neta"
        description: "Ingreso total de partidas viables descontando devoluciones/cancelaciones internas."

      - name: impuestosTotales
        # Sumamos las medidas específicas de impuestos calculadas en las partidas
        sql: "{partidasVenta.impuestoIVA16} + {partidasVenta.impuestoIEPS8}"
        type: number
        format: currency
        title: "Impuestos ($)"
        description: "Suma de IVA 16% e IEPS 8% calculados partida por partida."

      - name: ventaTotalFinal
        sql: "{partidasVenta.ingresoTotalViable} + {partidasVenta.impuestoIVA16} + {partidasVenta.impuestoIEPS8}"
        type: number
        format: currency
        title: "Venta Total (Final)"
        description: "Ingreso neto + impuestos calculados."

      - name: iva16
        sql: "{partidasVenta.impuestoIVA16}"
        type: number
        format: currency
        title: "IVA 16%"

      - name: ieps8
        sql: "{partidasVenta.impuestoIEPS8}"
        type: number
        format: currency
        title: "IEPS 8%"

      - name: utilidadBruta
        sql: "{partidasVenta.margen}"
        type: number
        format: currency
        title: "Utilidad"

      - name: cantidadVendida
        sql: "{partidasVenta.cantidad_dim}"
        type: sum
        title: "Unidades Vendidas"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]

      - name: conteoTickets
        sql: "{partidasVenta.venta}"
        type: count_distinct
        title: "# Tickets"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]


