     #   sql: "{partidasVenta.totalImpuestosCalculados}"
      #  type: number
       # format: currency
       # title: "Impuestos ($)"
       # description: "Total de impuestos calculados (IVA + IEPS)."

  #    - name: ingresoTotalViable
   #     sql: "{partidasVenta.cantidad_dim} * {partidasVenta.precio}"
    #    type: number
     #   format: currency
      #  title: "Venta Bruta ($)"

   #   - name: ventaTotal
    #    sql: "{partidasVenta.ingresoTotalViable} + {partidasVenta.totalImpuestosCalculados}"
     #   type: number
      #  format: currency
       # title: "Venta Total (Final)"

      - name: impuestoRealSinDuplicar
        sql: "{partidasVenta.ventas.impuestoSinDuplicar}"
        type: number
        format: currency
        title: "Impuestos Reales (Sin Duplicados)"

   

      - name: conteoTickets
        sql: "{partidasVenta.venta}"
        type: count_distinct
        title: "# Tickets"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]
