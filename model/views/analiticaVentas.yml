views:
  - name: analiticaVentas
    title: "1. Analítica de Ventas"
    description: "Vista Maestra de Ventas con Impuestos Corregidos"
    
    cubes:
      - join_path: partidasVenta
        includes:
          - venta
          - skuRaw
          - sucursal
          - is_viable
          - precio
          - cantidad_dim
          - fecha
          - anio
          - numMes
          - nombreMes
          - diaSemana
          - impuestoIVA16
          - impuestoIEPS8
          - totalImpuestosCalculados
      - join_path: partidasVenta.ventas
        includes:
          - montoTotal
          - montoSinDuplicar
          - impuestoSinDuplicar
          - cliente
      - join_path: catalogoProductos
        includes:
          - name: descripcion
            alias: nombreProducto
          - linea
          - marca

    dimensions:
      - name: id
        sql: "{partidasVenta.venta} || '-' || {partidasVenta.skuRaw}"
        type: string
        primary_key: true
        title: "ID Único"
      - name: sku
        sql: "{partidasVenta.skuRaw}"
        type: string
        title: "SKU"
      - name: codigoCliente
        sql: "{ventas.cliente}"
        type: string
        title: "Código Cliente"
      - name: numeroTicket
        sql: "{partidasVenta.venta}"
        type: string
        title: "Folio Ticket"

    measures:
      - name: ingresoTotal
        sql: "{partidasVenta.cantidad_dim} * {partidasVenta.precio}"
        type: sum
        format: currency
        title: "Venta Bruta ($)"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]
      - name: impuestosTotales
        sql: "{partidasVenta.impuestoIVA16} + {partidasVenta.impuestoIEPS8}"
        type: sum
        format: currency
        title: "Impuestos ($)"
        description: "Total de impuestos calculados (IVA + IEPS) sin duplicados."
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]
      - name: impuestoRealSinDuplicar
        sql: "{ventas.impuestoSinDuplicar}"
        type: number
        format: currency
        title: "Impuestos Reales (Sin Duplicados)"
      - name: iva16
        sql: "{partidasVenta.impuestoIVA16}"
        type: number
        format: currency
        title: "IVA 16%"
      - name: ieps8
        sql: "{partidasVenta.impuestoIEPS8}"
        type: number
        format: currency
        title: "IEPS 8%"
      - name: cantidadVendida
        sql: "{partidasVenta.cantidad_dim}"
        type: sum
        title: "Unidades Vendidas"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]
      - name: conteoTickets
        sql: "{partidasVenta.venta}"
        type: count_distinct
        title: "# Tickets"
        filters: [{ sql: "{partidasVenta.is_viable} = true" }]
