# =============================================================================
# VISTA: analiticaVentas
# =============================================================================
# Esta es la VISTA MAESTRA de ventas del proyecto BI de Los Canastos.
# Una "vista" en Cube.js no tiene tabla propia; en su lugar, combina campos
# de múltiples cubos en un solo objeto de análisis para simplificar el trabajo
# de los analistas y herramientas de BI como Preset.
#
# Cubos que consolida:
#   1. partidasVenta   → detalle artículo por artículo (líneas del ticket)
#   2. ventas          → cabecero del documento (folio, cliente, tipo, monto)
#   3. catalogoProductos → información del artículo (nombre, línea, marca)
#
# ¿Por qué una vista y no un cubo directo?
#   Porque los impuestos se calculan correctamente a nivel de partida
#   (donde está el precio, cantidad, descuento y tasa), mientras que el
#   monto total sin duplicados vive en el cabecero (ventas).
#   La vista permite exponer ambas perspectivas en un solo lugar.
# =============================================================================

views:
  - name: analiticaVentas
    title: "1. Analítica de Ventas"
    description: "Vista Maestra de Ventas con Impuestos Corregidos"

    cubes:
      # -----------------------------------------------------------------------
      # BLOQUE 1: Campos del cubo "partidasVenta"
      # Contiene las dimensiones y medidas de cada línea de venta.
      # Es el cubo principal de esta vista, todos los demás se unen a él.
      # -----------------------------------------------------------------------
      - join_path: partidasVenta
        includes:
          - sucursal # Sucursal donde ocurrió la venta
          - fecha # Fecha de la transacción
          - anio # Año (extraído de fecha)
          - numMes # Número de mes (1–12)
          - nombreMes # Nombre del mes en español
          - diaSemana # Día de la semana (0=Dom, 6=Sáb)
          - is_viable # Indicador de registro válido/viable
          - skuRaw # Código del artículo tal como aparece en el ticket
          - venta # Número de folio de la venta
          - precio # Precio unitario del artículo
          - cantidad_dim # Cantidad vendida del artículo

          # Se exponen con alias para facilitar la lectura en reportes:
          - name: ingresoTotalViable
            alias: ventaBruta # Ingreso bruto = precio × cantidad × (1 - descuento%)

          - name: impuestoIVA16
            alias: iva16 # IVA al 16% calculado por partida

          - name: impuestoIEPS8
            alias: ieps8 # IEPS al 8% calculado por partida

          - name: totalImpuestosCalculados
            alias: impuestosTotales # IVA + IEPS combinados

          - descuentoTotal # Suma de descuentos aplicados
          - cantidadVendida # Total de unidades vendidas
          - conteoTickets # Número de folios únicos (≈ clientes atendidos)

      # -----------------------------------------------------------------------
      # BLOQUE 2: Campos del cubo "ventas" (cabecero)
      # Accedido mediante la relación partidasVenta → ventas.
      # Se usa para obtener el monto total del cabecero sin duplicados y
      # datos del cliente y tipo de documento.
      # -----------------------------------------------------------------------
      - join_path: partidasVenta.ventas
        includes:
          - montoTotal # Monto bruto del cabecero (solo para diagnóstico)
          - montoSinDuplicar # Monto filtrado para evitar duplicados (FAC, REM, DV, DEV)
          - cliente # Código del cliente
          - tipoDocumento # Tipo de documento (FAC, TIC, PE, REM, etc.)

          # Dimensiones de mayoreo: permiten filtrar ventas internas o pedidos pendientes
          - observacion # Observación del documento (ej: "TICKETS ANEXOS")
          - estado # Estado del documento (ej: PE = pendiente)
          - clientesUnicos # Clientes con código registrado (excluye mostrador 'sys')

      # -----------------------------------------------------------------------
      # BLOQUE 3: Campos del catálogo de productos
      # Proporciona información descriptiva de cada artículo vendido.
      # Se une directamente al cubo catalogoProductos por el SKU.
      # -----------------------------------------------------------------------
      - join_path: catalogoProductos
        includes:
          - name: descripcion
            alias: nombreProducto # Nombre legible del artículo
          - linea # Línea de producto (ej: Abarrotes, Lácteos)
          - marca # Marca del artículo

    # -------------------------------------------------------------------------
    # DIMENSIONES ADICIONALES DE LA VISTA
    # Dimensiones calculadas que no existen en ningún cubo base,
    # pero son útiles para identificar filas en la vista.
    # -------------------------------------------------------------------------
    dimensions:
      # Llave primaria de la vista: combina folio y SKU para identificar
      # de forma única cada línea de análisis en el explorador de datos.
      - name: id
        sql: "{partidasVenta.venta} || '-' || {partidasVenta.skuRaw}"
        type: string
        primary_key: true
        title: "ID Único"

      # SKU del artículo (atajo para referenciar sin ir al cubo base).
      - name: sku
        sql: "{partidasVenta.skuRaw}"
        type: string
        title: "SKU"

      # Código del cliente expuesto directamente en la vista.
      # Permite filtrar o agrupar por cliente desde un solo lugar.
      - name: codigoCliente
        sql: "{partidasVenta.ventas.cliente}"
        type: string
        title: "Código Cliente"

      # Folio del ticket/factura expuesto directamente en la vista.
      - name: numeroTicket
        sql: "{partidasVenta.venta}"
        type: string
        title: "Folio Ticket"

    # -------------------------------------------------------------------------
    # MEDIDAS ADICIONALES DE LA VISTA
    # Medidas calculadas específicas para esta vista que combinan campos
    # de diferentes cubos o aplican lógica especial.
    # -------------------------------------------------------------------------
    measures:
      # Venta total al consumidor final = ingreso bruto + impuestos calculados.
      # Esta es la cifra que el cliente pagó realmente (precio con impuestos incluidos).
      # Se calcula sumando la base gravable (ventaBruta) más los impuestos correspondientes.
      - name: ventaTotal
        sql: "{partidasVenta.ingresoTotalViable} + {partidasVenta.totalImpuestosCalculados}"
        type: number
        format: currency
        title: "Venta Total (Final)"

      # Impuesto real tomado directamente del cabecero de ventas, sin duplicados.
      # A diferencia de los impuestos calculados en partidasVenta (que se derivan
      # del precio × tasa), este campo usa el impuesto ya registrado en el sistema
      # contable para los tipos de documento finales (FAC, REM, DV, DEV).
      # Útil para cuadrar con los reportes fiscales del sistema original.
      - name: impuestoRealSinDuplicar
        sql: "{partidasVenta.ventas.impuestoSinDuplicar}"
        type: number
        format: currency
        title: "Impuestos Reales (Sin Duplicados)"
