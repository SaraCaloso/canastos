# =============================================================================
# VISTA: estadoInventario
# =============================================================================
# Esta vista expone el cubo historicoInventario enfocado en el ANÁLISIS DE
# INVENTARIO HISTÓRICO por producto, sucursal y fecha.
#
# Permite monitorear niveles de stock, detectar faltantes y comparar
# el inventario entre tiendas y la bodega central (CEDIS).
#
# ⚠️ CONSIDERACIONES IMPORTANTES:
#   - El CEDIS (bodega central) concentra el 70-80% del stock total.
#     Sin filtrar, los totales están dominados por la bodega y no reflejan
#     la realidad de cada tienda individual.
#   - Para análisis por tienda usar el segmento 'soloTiendas'.
#   - Inventarios negativos indican faltantes reales o errores de captura
#     que deben revisarse con el área de operaciones.
#
# Relación con otros cubos:
#   → Consume únicamente historicoInventario.
#   → No agrega joins propios; hereda la estructura del cubo base.
# =============================================================================

views:
  - name: estadoInventario
    title: "2. Estado de Inventario"
    description: |
      Vista para analizar inventario histórico por producto, sucursal y fecha.

      ⚠️ IMPORTANTE:
      - El inventario total incluye CEDIS (bodega central) que concentra 70-80% del stock
      - Para análisis por tienda, usar segmento 'Solo Tiendas'
      - Inventarios negativos indican faltantes o errores de captura

    # -------------------------------------------------------------------------
    # CUBOS INCLUIDOS
    # Se incluye el subconjunto de campos relevante para análisis de inventario.
    # Se omiten campos técnicos de partición y metadatos internos del cubo base.
    # -------------------------------------------------------------------------
    cubes:
      # Única fuente de esta vista: snapshots históricos de inventario por
      # producto y ubicación. Permite analizar evolución del stock en el tiempo.
      - join_path: historicoInventario
        includes:
          # --- Dimensiones de tiempo ---
          - fechaCaptura # Fecha en que se tomó el snapshot de inventario
          - anio # Agrupación anual
          - numMes # Agrupación mensual (orden cronológico)
          - nombreMes # Etiqueta legible del mes para reportes
          - diaSemana # Análisis de comportamiento por día de la semana

          # --- Dimensiones de ubicación ---
          - sucursal # Filtro y agrupación por sucursal o CEDIS
          - tipoUbicacion # Distingue entre tienda física y bodega central

          # --- Dimensiones de producto ---
          - sku # Clave única del artículo; llave para joins con ventas
          - producto # Nombre descriptivo del artículo
          - marca # Marca del producto; útil para análisis por proveedor
          - linea # Línea o categoría del producto
          - unidadMedida # Unidad en que se cuenta el stock (pieza, caja, kg, etc.)

          # --- Segmentos heredados del cubo base ---
          # Se exponen como dimensiones para que estén disponibles en filtros.
          - soloTiendas # Excluye CEDIS; muestra solo stock en piso de venta
          - soloCEDIS # Muestra solo el stock en bodega central
          - inventarioPositivo # Filtra artículos con existencia real mayor a cero
          - inventarioNegativo # Filtra artículos con existencia negativa (faltantes/errores)

          # --- Dimensiones de precio y costo ---
          # Agregadas en FIX reciente para habilitar análisis de valor de inventario.
          - precioConImpuesto # Precio de venta al público incluyendo impuestos
          - costoUnitario # Costo de adquisición por unidad; base para calcular margen

          # --- Medidas de stock ---
          # cantidadStock se expone con alias 'unidadesActuales' para mayor claridad
          # en reportes; internamente sigue siendo la misma columna del cubo base.
          - name: cantidadStock
            alias: unidadesActuales # Unidades en existencia al momento del snapshot
          - stockPromedio # Promedio de unidades en el período seleccionado
          - numUbicaciones # Número de ubicaciones distintas donde hay stock del SKU
          - stockMinimo # Mínimo de unidades registrado en el período
          - stockMaximo # Máximo de unidades registrado en el período
